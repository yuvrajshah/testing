    <script>
        const DAD_UDHAAR_ID = "cat_1762946534522";
        const BIN_ID = "69a163dd43b1c97be9a30026";
        const API_KEY = "$2a$10$d3j4cE6hPJ6QJ19dGBO3weaZllK12qHJ.fKbRhm6RRZHiewtvbzm6";
        const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        class FinanceApp {
            constructor() {
                this.data = { transactions: [], categories: [], currencyRates: { usdToInr: 90, usdToNpr: 144 } };
                this.currentView = 'dashboard';
                this.viewParams = {};
                this.filterState = { search: '', dateStart: '', dateEnd: '', category: 'all', type: 'all' };
                this.vaultKey = null;
                this.isSidebarOpen = false;
                this.init();
            }

            init() {
                document.getElementById('loginForm').addEventListener('submit', (e) => this.login(e));
                document.getElementById('importFile').addEventListener('change', (e) => this.importData(e));

                const savedKey = localStorage.getItem('shahi_vault_key');
                if (savedKey) {
                    document.getElementById('vaultPassword').value = savedKey;
                    document.getElementById('rememberMe').checked = true;
                    this.login(new Event('submit'));
                }
            }

            async login(e) {
                if (e) e.preventDefault();
                const pwdInput = document.getElementById('vaultPassword').value;
                const btn = document.getElementById('loginBtn');
                const errorMsg = document.getElementById('loginError');
                
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Decrypting...';
                errorMsg.classList.add('hidden');
            
                try {
                    const response = await fetch(BIN_URL, { headers: { 'X-Master-Key': API_KEY } });
                    if (!response.ok) throw new Error("Cloud fetch failed.");
                    const result = await response.json();
                    
                    if (!result.record || Object.keys(result.record).length === 0 || !result.record.data) {
                        this.vaultKey = pwdInput; this.handleSuccessfulLogin(); return;
                    }
            
                    // 1. Decrypt the cloud data
                    const bytes = CryptoJS.AES.decrypt(result.record.data, pwdInput);
                    const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                    if (!decryptedString) throw new Error("Incorrect Password");
            
                    // 2. SMART CHECK: Is it compressed?
                    let parsedData;
                    if (decryptedString.startsWith('{')) {
                        // Old format: It's raw JSON, parse it normally
                        parsedData = JSON.parse(decryptedString);
                    } else {
                        // New format: It's compressed, decompress it first
                        const decompressed = LZString.decompressFromUTF16(decryptedString);
                        parsedData = JSON.parse(decompressed);
                    }
            
                    this.data = { ...this.data, ...parsedData };
                    this.vaultKey = pwdInput; 
                    
                    // 3. Auto-upgrade old data: If we loaded old uncompressed data, 
                    // silently re-save it right now so it becomes compressed in the cloud.
                    if (decryptedString.startsWith('{')) {
                        console.log("Upgrading cloud vault to compressed format...");
                        this.save(); 
                    }
            
                    this.handleSuccessfulLogin();
            
                } catch (error) {
                    btn.innerHTML = 'Unlock Vault';
                    errorMsg.textContent = error.message.includes("Incorrect") ? "Incorrect password." : "Network/Decryption error.";
                    errorMsg.classList.remove('hidden');
                    console.error(error);
                }
            }

            handleSuccessfulLogin() {
                if (document.getElementById('rememberMe').checked) localStorage.setItem('shahi_vault_key', this.vaultKey);
                else localStorage.removeItem('shahi_vault_key');

                const lockScreen = document.getElementById('lockScreen');
                lockScreen.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => lockScreen.classList.add('hidden'), 300);
                
                document.getElementById('mainSidebar').classList.remove('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                
                this.setView('dashboard');
                this.setupLiveCalc();
            }

            logout() {
                this.vaultKey = null;
                this.data = { transactions: [], categories: [], currencyRates: { usdToInr: 90, usdToNpr: 144 } };
                document.getElementById('vaultPassword').value = '';
                
                document.getElementById('mainSidebar').classList.add('hidden');
                document.getElementById('mainContent').classList.add('hidden');
                
                const lockScreen = document.getElementById('lockScreen');
                lockScreen.classList.remove('hidden');
                setTimeout(() => lockScreen.classList.remove('opacity-0', 'pointer-events-none'), 10);
                document.getElementById('loginBtn').innerHTML = 'Unlock Vault';
                
                if (this.isSidebarOpen) this.toggleSidebar();
            }

            async save() {
                const saveBtn = document.getElementById('saveTransactionBtn') || document.getElementById('saveMealBtn');
                const defaultBtnText = document.getElementById('saveTransactionBtn') ? '<i class="fas fa-check"></i> Save Transaction' : '<i class="fas fa-check"></i> Save Log';
                
                if (saveBtn) { 
                    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...'; 
                    saveBtn.disabled = true; 
                }
            
                try {
                    // 1. Convert to text
                    const stringifiedData = JSON.stringify(this.data);
                    
                    // 2. COMPRESS the text to make it tiny (Shrinks size by ~85%)
                    const compressedData = LZString.compressToUTF16(stringifiedData);
                    
                    // 3. Encrypt the tiny compressed text
                    const encryptedData = CryptoJS.AES.encrypt(compressedData, this.vaultKey).toString();
            
                    const response = await fetch(BIN_URL, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': API_KEY,
                            'X-Bin-Versioning': 'false' // Keeps JSONBin from locking up
                        },
                        body: JSON.stringify({ data: encryptedData })
                    });
                    
                    if (!response.ok) throw new Error(`Cloud rejected save (Status ${response.status})`);
                    
                    this.refreshCurrentView();
                } catch (err) {
                    alert("Failed to sync to cloud! Check connection.\n\n" + err.message);
                    console.error(err);
                } finally {
                    if (saveBtn) { 
                        saveBtn.innerHTML = defaultBtnText; 
                        saveBtn.disabled = false; 
                    }
                }
            }
            openChangePassword() {
                if (this.isSidebarOpen) this.toggleSidebar();
                document.getElementById('cpCurrent').value = '';
                document.getElementById('cpNew').value = '';
                document.getElementById('cpConfirm').value = '';
                document.getElementById('cpError').classList.add('hidden');
                document.getElementById('changePasswordModal').classList.remove('hidden');
            }

            async submitChangePassword(e) {
                e.preventDefault();
                const current = document.getElementById('cpCurrent').value;
                const newPw = document.getElementById('cpNew').value;
                const confirmPw = document.getElementById('cpConfirm').value;
                const err = document.getElementById('cpError');
                const btn = document.getElementById('cpSubmitBtn');

                if (current !== this.vaultKey) { err.textContent = "Current password is wrong."; err.classList.remove('hidden'); return; }
                if (newPw !== confirmPw) { err.textContent = "New passwords do not match."; err.classList.remove('hidden'); return; }
                
                err.classList.add('hidden');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Encrypting...';
                btn.disabled = true;

                this.vaultKey = newPw; 
                if (localStorage.getItem('shahi_vault_key')) localStorage.setItem('shahi_vault_key', newPw);

                await this.save(); 
                
                btn.innerHTML = 'Update Vault';
                btn.disabled = false;
                this.closeModal('changePasswordModal');
                alert("Vault master key successfully updated.");
            }

            toggleSidebar() {
                const sb = document.getElementById('mainSidebar');
                const bd = document.getElementById('sidebarBackdrop');
                this.isSidebarOpen = !this.isSidebarOpen;
                
                if (this.isSidebarOpen) {
                    sb.classList.remove('hidden');
                    setTimeout(() => sb.classList.remove('-translate-x-full'), 10);
                    bd.classList.remove('hidden');
                    setTimeout(() => bd.classList.remove('opacity-0'), 10);
                } else {
                    sb.classList.add('-translate-x-full');
                    bd.classList.add('opacity-0');
                    setTimeout(() => { bd.classList.add('hidden'); }, 300);
                }
            }

            closeModal(id) { document.getElementById(id).classList.add('hidden'); if(id==='transactionModal') document.getElementById('transactionForm').reset(); }

            setView(view, params = {}) {
                this.currentView = view; this.viewParams = params;
                
                if (this.isSidebarOpen && window.innerWidth < 768) this.toggleSidebar();

                document.querySelectorAll('.nav-item').forEach(el => {
                    el.classList.remove('bg-white/10', 'text-white', 'shadow-sm');
                    el.classList.add('text-gray-400');
                    if (view !== 'yearDetails' && el.textContent.toLowerCase().includes(view)) {
                        el.classList.add('bg-white/10', 'text-white', 'shadow-sm');
                        el.classList.remove('text-gray-400');
                    }
                });

                const content = document.getElementById('contentArea');
                
                if (view === 'dashboard') { document.getElementById('pageTitle').textContent = 'Dashboard'; this.renderDashboard(content); } 
                else if (view === 'transactions') { document.getElementById('pageTitle').textContent = 'Transactions'; this.renderTransactions(content); } 
                else if (view === 'categories') { document.getElementById('pageTitle').textContent = 'Categories'; this.renderCategories(content); } 
                else if (view === 'yearDetails') { document.getElementById('pageTitle').textContent = `${params.year} Breakdown`; this.renderYearDetails(content, params.year); }
            }

            refreshCurrentView() { this.setView(this.currentView, this.viewParams); }

            /* --- DASHBOARD --- */
            renderDashboard(container) {
                const allStats = this.calculateStats('all');
                const years = [...new Set(this.data.transactions.map(t => new Date(t.date).getFullYear()))].sort((a, b) => b - a);
                if (years.length === 0) years.push(new Date().getFullYear());
                const yearsHtml = years.map(year => this.renderYearlyCard(year)).join('');

                const grossTotal = Math.max(1, allStats.grossIn.usd);

                            <div class="absolute right-0 top-0 opacity-10 transform translate-x-4 -translate-y-4 md:translate-x-10 md:-translate-y-10"><i class="fas fa-wallet text-9xl text-white"></i></div>
                            <div class="absolute left-0 bottom-0 w-full h-1/2 bg-gradient-to-t from-black/20 to-transparent"></div>
                            <div class="relative z-10">
                                <div class="flex justify-between items-start mb-4">
                                    <h3 class="text-brand-100/80 font-medium tracking-wide uppercase text-xs md:text-sm">Available Balance</h3>
                                    <i class="fas fa-microchip text-brand-300/50 text-2xl rotate-90"></i>
                                </div>
                                <div class="flex items-baseline gap-3 mb-6">
                                    <span class="text-4xl md:text-5xl font-bold text-white tracking-tight">$${this.fmt(allStats.balance.usd)}</span>
                                    <span class="text-lg md:text-xl text-brand-200 font-medium">USD</span>
                                </div>
                                <div class="flex flex-wrap gap-4 md:gap-8 text-sm text-brand-100 font-mono bg-black/10 inline-flex p-3 rounded-xl border border-white/10 backdrop-blur-sm">

                                </div>

                        </div>
                        
                        <div class="lg:col-span-3 grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-4">
                            ${this.statCard('Gross In', allStats.grossIn.usd, 'text-accent-prod', 'fa-arrow-down', 'bg-accent-prod/10')}
                            ${this.statCard('Fees Paid', allStats.fees.usd, 'text-orange-400', 'fa-receipt', 'bg-orange-400/10')}
                            ${this.statCard('Total Spent', allStats.expense.usd, 'text-brand-400', 'fa-shopping-cart', 'bg-brand-400/10')}
                            ${this.statCard('Productive', allStats.productive.usd, 'text-emerald-400', 'fa-check-circle', 'bg-emerald-400/10')}
                            ${this.statCard('Waste', allStats.waste.usd, 'text-rose-400', 'fa-trash', 'bg-rose-400/10')}
                            ${this.statCard('Dad Loan', allStats.dadUdhaar.usd, 'text-green-400', 'fa-hand-holding-usd', 'bg-green-400/10')}
                        </div>
                        
                        <div class="lg:col-span-1 bg-dark-card border border-dark-border rounded-2xl p-5 flex flex-col items-center justify-center">
                            <h4 class="text-gray-400 text-sm font-medium mb-4 w-full text-left">Income Distribution</h4>
                            <div class="relative w-40 h-40 md:w-48 md:h-48">
                                <canvas id="distChart"></canvas>
                                <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                    <div class="text-[10px] md:text-xs text-emerald-400 font-bold">${pProd}% Prod</div>
                                    <div class="text-[10px] md:text-xs text-rose-400 font-bold">${pWaste}% Wst</div>
                                    <div class="text-[10px] md:text-xs text-orange-400 font-bold">${pFees}% Fee</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-4 md:space-y-6">${yearsHtml}</div>
                `;

                setTimeout(() => {
                    const ctx = document.getElementById('distChart').getContext('2d');
                    new Chart(ctx, { type: 'doughnut', data: { labels: ['Productive', 'Waste', 'Fees'], datasets: [{ data: [allStats.productive.usd, allStats.waste.usd, allStats.fees.usd], backgroundColor: ['#10b981', '#ef4444', '#fb923c'], borderWidth: 0, cutout: '70%' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
                }, 50);
            }

            renderYearlyCard(year) {
                const s = this.calculateStats(year);
                const ir = this.data.currencyRates.usdToInr;
                const nr = this.data.currencyRates.usdToNpr;
                
                const grossTotal = Math.max(1, s.grossIn.usd);
                const pProd = ((s.productive.usd / grossTotal) * 100).toFixed(1);
                const pWaste = ((s.waste.usd / grossTotal) * 100).toFixed(1);
                const pFees = ((s.fees.usd / grossTotal) * 100).toFixed(1);

                return `
                    <div class="bg-dark-card rounded-2xl p-5 md:p-6 border border-dark-border hover:border-brand-500/50 transition-colors">
                        <div class="flex justify-between items-center mb-5">
                            <h3 class="text-lg md:text-xl font-bold text-white flex items-center gap-2"><i class="far fa-calendar-alt text-brand-500"></i> ${year} Overview</h3>
                            <button onclick="app.setView('yearDetails', {year: ${year}})" class="text-xs md:text-sm bg-dark-bg text-brand-400 border border-dark-border px-3 py-1.5 rounded-lg hover:bg-brand-600 hover:text-white hover:border-brand-500 transition-all flex items-center gap-1">
                                <span class="hidden sm:inline">Monthly </span>Breakdown <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                            <div class="bg-dark-bg p-3 md:p-4 rounded-xl border border-dark-border border-l-4 border-l-emerald-500">
                                <div class="text-gray-400 text-[10px] md:text-xs uppercase font-semibold mb-1">Productive</div>
                                <div class="text-base md:text-xl font-bold text-emerald-400">$${this.fmt(s.productive.usd)}</div>
                                <div class="text-[10px] text-gray-500 font-mono mt-0.5">₹${this.fmt(s.productive.usd*ir)} • रू${this.fmt(s.productive.usd*nr)}</div>

                                <div class="text-[10px] text-gray-500 font-mono mt-0.5">₹${this.fmt(s.waste.usd*ir)} • रू${this.fmt(s.waste.usd*nr)}</div>

                            </div>
                            <div class="bg-dark-bg p-3 md:p-4 rounded-xl border border-dark-border border-l-4 border-l-indigo-500 relative overflow-hidden flex flex-col justify-between">
                                <div>
                                    <div class="text-gray-400 text-[10px] md:text-xs uppercase font-semibold mb-1">Total Spent</div>
                                    <div class="text-base md:text-xl font-bold text-indigo-400">$${this.fmt(s.expense.usd)}</div>
                                    <div class="text-[10px] text-gray-500 font-mono mt-0.5 mb-2">₹${this.fmt(s.expense.usd*ir)} • रू${this.fmt(s.expense.usd*nr)}</div>
                                </div>
                                <div class="flex gap-2 text-[9px] md:text-[10px] font-medium mt-1 mb-1 relative z-10">
                                    <span class="text-emerald-500">${pProd}% Prod</span>
                                    <span class="text-rose-500">${pWaste}% Wst</span>
                                    <span class="text-orange-500">${pFees}% Fee</span>
                                </div>
                                <div class="absolute bottom-0 left-0 w-full h-1.5 flex">
                                    <div class="bg-emerald-500 h-full" style="width:${pProd}%"></div>
                                    <div class="bg-rose-500 h-full" style="width:${pWaste}%"></div>
                                    <div class="bg-orange-500 h-full" style="width:${pFees}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            /* --- TRANSACTIONS --- */
            renderTransactions(container) {
                let list = [...this.data.transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
                if (this.filterState.search) list = list.filter(t => (t.name || t.description || '').toLowerCase().includes(this.filterState.search.toLowerCase()));
                if (this.filterState.type !== 'all') list = list.filter(t => t.type === this.filterState.type);
                if (this.filterState.category !== 'all') list = list.filter(t => t.categories && t.categories.includes(this.filterState.category));

                container.innerHTML = `
                    <div class="mb-6 flex flex-col md:flex-row gap-3 bg-dark-card p-3 md:p-4 rounded-xl border border-dark-border shadow-sm">
                        <div class="flex-1 w-full"><div class="relative"><i class="fas fa-search absolute left-3 top-3.5 text-gray-500"></i><input type="text" placeholder="Search transactions..." class="input-dark w-full pl-10 pr-4 py-2.5 rounded-lg text-sm" oninput="app.filterState.search = this.value; app.refreshCurrentView()" value="${this.filterState.search}"></div></div>
                        <div class="flex gap-3 w-full md:w-auto">
                            <select class="input-dark rounded-lg px-3 py-2.5 text-sm flex-1 md:w-36" onchange="app.filterState.type = this.value; app.refreshCurrentView()"><option value="all">All Types</option><option value="in" ${this.filterState.type === 'in' ? 'selected' : ''}>Income</option><option value="out" ${this.filterState.type === 'out' ? 'selected' : ''}>Expense</option></select>
                            <select class="input-dark rounded-lg px-3 py-2.5 text-sm flex-1 md:w-40" onchange="app.filterState.category = this.value; app.refreshCurrentView()"><option value="all">Categories</option>${this.data.categories.map(c => `<option value="${c.id}" ${this.filterState.category === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}</select>
                        </div>
                    </div>
                    <div class="space-y-3">${list.length === 0 ? '<div class="text-center text-gray-500 py-12 bg-dark-card rounded-xl border border-dark-border border-dashed"><i class="fas fa-receipt text-4xl mb-3 opacity-20"></i><br>No transactions found</div>' : ''}${list.map(t => this.transactionRow(t)).join('')}</div>
                `;
            }

            transactionRow(t) {
                const isIn = t.type === 'in';
                const dateObj = new Date(t.date);
                const date = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const time = dateObj.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                
                const usdVal = isIn ? t.netAmount.usd : t.amount.usd;
                const inrVal = isIn ? t.netAmount.inr : t.amount.inr;
                const nprVal = isIn ? t.netAmount.npr : t.amount.npr;
                
                const amtUsdTxt = isIn ? `+$${this.fmt(usdVal)}` : `-$${this.fmt(usdVal)}`;
                const sub = isIn ? `Fee: $${this.fmt(t.fees.usd)}` : ``;
                
                let badges = !isIn && t.categories ? t.categories.map(id => { const c = this.data.categories.find(x => x.id === id); return c ? `<span class="text-[10px] px-2 py-0.5 rounded-full border bg-dark-bg truncate max-w-[80px]" style="border-color:${c.color}40; color:${c.color}">${c.name}</span>` : ''; }).join(' ') : '';

                return `
                <div class="bg-dark-card border border-dark-border rounded-xl p-4 flex items-center justify-between hover:border-brand-500/30 transition-colors group relative overflow-hidden">
                    <div class="absolute left-0 top-0 bottom-0 w-1 ${isIn ? 'bg-emerald-500' : 'bg-rose-500'} opacity-50"></div>
                    <div class="flex items-center gap-4 min-w-0 flex-1">
                        <div class="w-10 h-10 md:w-12 md:h-12 flex-shrink-0 rounded-full flex items-center justify-center ${isIn ? 'bg-emerald-500/10 text-emerald-500' : 'bg-rose-500/10 text-rose-500'}"><i class="fas ${isIn ? 'fa-arrow-down' : 'fa-arrow-up'} text-lg"></i></div>
                        <div class="min-w-0 flex-1">
                            <div class="font-semibold text-white truncate text-sm md:text-base">${t.name || (isIn ? 'Money Added' : 'General Expense')}</div>
                            <div class="text-xs text-gray-400 mt-1 flex items-center gap-2 flex-wrap"><span>${date} • ${time}</span> <span class="hidden sm:inline">${badges}</span></div>
                        </div>
                    </div>
                    <div class="flex flex-col items-end pl-2">
                        <div class="font-bold font-mono ${isIn ? 'text-emerald-400' : 'text-rose-400'} text-base md:text-lg">${amtUsdTxt}</div>
                        <div class="text-[10px] md:text-[11px] text-gray-500 font-mono mt-0.5">₹${this.fmt(inrVal)} • रू${this.fmt(nprVal)}</div>
                        ${sub ? `<div class="text-[10px] md:text-[11px] text-gray-500 font-mono mt-0.5">${sub}</div>` : ''}
                        <div class="flex gap-1.5 mt-2 md:opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="app.editTransaction('${t.id}')" class="w-7 h-7 rounded-md bg-dark-bg border border-dark-border text-brand-400 hover:bg-brand-600 hover:text-white flex items-center justify-center"><i class="fas fa-pencil-alt text-xs"></i></button>
                            <button onclick="app.deleteTransaction('${t.id}')" class="w-7 h-7 rounded-md bg-dark-bg border border-dark-border text-rose-400 hover:bg-rose-600 hover:text-white flex items-center justify-center"><i class="fas fa-trash-alt text-xs"></i></button>
                        </div>
                    </div>
                </div>`;
            }

            /* --- HELPERS & REST --- */
            statCard(title, val, color, icon, bgClass) { 
                const inr = this.fmt(val * this.data.currencyRates.usdToInr);
                const npr = this.fmt(val * this.data.currencyRates.usdToNpr);
                return `<div class="bg-dark-card border border-dark-border rounded-xl p-4 flex flex-col justify-between hover:bg-dark-border/30 transition-colors"><div class="flex justify-between items-start mb-2"><p class="text-gray-400 text-[10px] md:text-xs font-semibold uppercase tracking-wider">${title}</p><div class="w-7 h-7 md:w-8 md:h-8 rounded-lg ${bgClass} flex items-center justify-center"><i class="fas ${icon} ${color} text-xs md:text-sm"></i></div></div><div><p class="text-lg md:text-xl font-bold text-white leading-none">$${this.fmt(val)}</p><p class="text-[10px] text-gray-500 mt-1.5 font-mono">₹${inr} • रू${npr}</p></div></div>`; 
            }
            
            calculateStats(scope) { let txs = this.data.transactions; if (typeof scope === 'number') txs = txs.filter(t => new Date(t.date).getFullYear() === scope); const stats = { grossIn: {usd:0}, fees: {usd:0}, netIn: {usd:0}, expense: {usd:0}, productive: {usd:0}, waste: {usd:0}, dadUdhaar: {usd:0}, balance: {usd:0,inr:0,npr:0} }; txs.forEach(t => { if (t.type === 'in') { stats.grossIn.usd += t.grossAmount.usd; stats.fees.usd += t.fees.usd; stats.netIn.usd += t.netAmount.usd; } else { stats.expense.usd += t.amount.usd; if (t.categories) { if (t.categories.includes(DAD_UDHAAR_ID)) stats.dadUdhaar.usd += (t.amount.usd / t.categories.length); const split = t.amount.usd / t.categories.length; t.categories.forEach(cid => { const c = this.data.categories.find(x => x.id === cid); if (c) { if (c.type === 'productive') stats.productive.usd += split; if (c.type === 'waste') stats.waste.usd += split; } }); } else stats.waste.usd += t.amount.usd; } }); stats.balance.usd = stats.netIn.usd - stats.expense.usd; stats.balance.inr = stats.balance.usd * this.data.currencyRates.usdToInr; stats.balance.npr = stats.balance.usd * this.data.currencyRates.usdToNpr; const totOut = Math.max(1, stats.expense.usd); stats.ratios = { prod: ((stats.productive.usd/totOut)*100).toFixed(1), waste: ((stats.waste.usd/totOut)*100).toFixed(1) }; return stats; }
            openSettings() { if(this.isSidebarOpen)this.toggleSidebar(); document.getElementById('setUsdToInr').value = this.data.currencyRates.usdToInr; document.getElementById('setUsdToNpr').value = this.data.currencyRates.usdToNpr; document.getElementById('settingsModal').classList.remove('hidden'); }
            saveSettings() { const i = parseFloat(document.getElementById('setUsdToInr').value), n = parseFloat(document.getElementById('setUsdToNpr').value); if(i&&n){ this.data.currencyRates={usdToInr:i,usdToNpr:n}; this.save(); document.getElementById('settingsModal').classList.add('hidden'); } }
            openTransactionModal() { document.getElementById('transactionModal').classList.remove('hidden'); document.getElementById('modalTitle').textContent="New Transaction"; document.getElementById('editId').value=""; document.getElementById('transactionForm').reset(); document.getElementById('transDate').value=new Date().toISOString().slice(0,16); document.querySelector('input[name="type"][value="out"]').click(); this.renderCategoryCheckboxes(); }
            toggleFormType(t) { if(t==='in'){document.getElementById('moneyInFields').classList.remove('hidden');document.getElementById('moneyOutFields').classList.add('hidden');}else{document.getElementById('moneyInFields').classList.add('hidden');document.getElementById('moneyOutFields').classList.remove('hidden');} }
            setupLiveCalc() { ['grossAmount','netAmount','grossCurrency','netCurrency'].forEach(id=>document.getElementById(id).addEventListener('input',()=>this.updateLiveFee())); }
            updateLiveFee() { const g=parseFloat(document.getElementById('grossAmount').value)||0, n=parseFloat(document.getElementById('netAmount').value)||0, gc=document.getElementById('grossCurrency').value, nc=document.getElementById('netCurrency').value; const fee = Math.max(0, this.convert(g,gc,'usd') - this.convert(n,nc,'usd')); document.getElementById('liveFeeCalc').textContent = `${this.fmt(fee)} USD`; }
            convert(amt,from,to) { if(from==='usd')return amt; if(from==='inr')return amt/this.data.currencyRates.usdToInr; if(from==='npr')return amt/this.data.currencyRates.usdToNpr; return amt; }
            fmt(n) { return n?n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'0.00'; }
            renderCategoryCheckboxes() { document.getElementById('categoryCheckboxes').innerHTML = this.data.categories.map(c => `<label class="flex items-center space-x-2 cursor-pointer hover:bg-white/5 p-2 rounded-lg border border-transparent hover:border-dark-border transition-colors"><input type="checkbox" name="cats" value="${c.id}" class="form-checkbox text-brand-500 rounded bg-dark-bg border-gray-600 w-4 h-4"><span class="text-sm font-medium" style="color:${c.color}">${c.name}</span></label>`).join(''); }
            handleTransactionSubmit(e) { e.preventDefault(); const id=document.getElementById('editId').value, type=document.querySelector('input[name="type"]:checked').value, date=document.getElementById('transDate').value, desc=document.getElementById('description').value; let t={id:id||'trans_'+Date.now(),type,date,description:desc}; if(type==='in'){ const g=parseFloat(document.getElementById('grossAmount').value)||0, n=parseFloat(document.getElementById('netAmount').value)||0; const gu=this.convert(g,document.getElementById('grossCurrency').value,'usd'), nu=this.convert(n,document.getElementById('netCurrency').value,'usd'); t.grossAmount=this.makeAmt(gu); t.netAmount=this.makeAmt(nu); t.fees=this.makeAmt(Math.max(0,gu-nu)); } else { const nm=document.getElementById('expenseName').value, val=parseFloat(document.getElementById('expenseAmount').value)||0, cats=Array.from(document.querySelectorAll('input[name="cats"]:checked')).map(cb=>cb.value); t.name=nm; t.amount=this.makeAmt(this.convert(val,document.getElementById('expenseCurrency').value,'usd')); t.categories=cats; } if(id){ const i=this.data.transactions.findIndex(x=>x.id===id); if(i!==-1)this.data.transactions[i]=t; } else this.data.transactions.push(t); this.save(); this.closeModal('transactionModal'); }
            editTransaction(id) { const t=this.data.transactions.find(x=>x.id===id); if(!t)return; this.openTransactionModal(); document.getElementById('modalTitle').textContent="Edit Transaction"; document.getElementById('editId').value=t.id; document.getElementById('transDate').value=new Date(t.date).toISOString().slice(0,16); document.getElementById('description').value=t.description||''; document.querySelector(`input[name="type"][value="${t.type}"]`).click(); if(t.type==='in'){ document.getElementById('grossAmount').value=t.grossAmount.usd; document.getElementById('grossCurrency').value='usd'; document.getElementById('netAmount').value=t.netAmount.usd; document.getElementById('netCurrency').value='usd'; } else { document.getElementById('expenseName').value=t.name; document.getElementById('expenseAmount').value=t.amount.usd; document.getElementById('expenseCurrency').value='usd'; setTimeout(()=>{t.categories.forEach(c=>{const cb=document.querySelector(`input[name="cats"][value="${c}"]`); if(cb)cb.checked=true;})},50); } }
            makeAmt(u) { return {usd:u, inr:u*this.data.currencyRates.usdToInr, npr:u*this.data.currencyRates.usdToNpr}; }
            deleteTransaction(id) { if(confirm('Delete this transaction?')) { this.data.transactions=this.data.transactions.filter(t=>t.id!==id); this.save(); } }
            
            /* -- CATEGORIES PAGE & YEAR DETAILS -- */
            renderCategories(container) { container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-3 gap-6"><div class="md:col-span-1 bg-dark-card rounded-2xl p-6 border border-dark-border shadow-sm h-fit"><h3 class="font-bold text-white mb-4 flex items-center gap-2"><i class="fas fa-plus-circle text-brand-500"></i> New Category</h3><form onsubmit="app.addCategory(event)" class="space-y-4"><div><input type="text" name="name" placeholder="Category Name" class="input-dark w-full rounded-xl px-4 py-3" required></div><div><select name="type" class="input-dark w-full rounded-xl px-4 py-3"><option value="productive">Productive Expense</option><option value="waste">Waste Expense</option><option value="recoverable">Recoverable (Loan)</option></select></div><button type="submit" class="w-full bg-brand-600 text-white px-4 py-3 rounded-xl hover:bg-brand-500 transition-colors font-medium">Add Category</button></form></div><div class="md:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-3 h-fit">${this.data.categories.map(c => `<div class="bg-dark-card border border-dark-border p-4 rounded-xl flex justify-between items-center hover:bg-dark-border/30 transition-colors relative overflow-hidden"><div class="absolute left-0 top-0 bottom-0 w-1.5" style="background-color: ${c.color}"></div><div class="pl-2"> <div class="font-bold text-white">${c.name}</div><div class="text-xs text-gray-500 capitalize mt-0.5">${c.type}</div></div><button onclick="app.deleteCategory('${c.id}')" class="w-8 h-8 rounded-lg bg-dark-bg text-gray-400 hover:text-rose-500 hover:bg-rose-500/10 flex items-center justify-center transition-colors"><i class="fas fa-trash text-sm"></i></button></div>`).join('')}</div></div>`; }
            
            renderYearDetails(container, year) { 
                const ir = this.data.currencyRates.usdToInr;
                const nr = this.data.currencyRates.usdToNpr;
                const months = Array.from({length: 12}, (_, i) => ({ index: i, name: new Date(0, i).toLocaleString('en-US', {month: 'short'}), income: 0, expense: 0 })); 
                const txs = this.data.transactions.filter(t => new Date(t.date).getFullYear() === year); 
                txs.forEach(t => { const mIndex = new Date(t.date).getMonth(); if (t.type === 'in') months[mIndex].income += t.netAmount.usd; else months[mIndex].expense += t.amount.usd; }); 
                const totalInc = months.reduce((a, b) => a + b.income, 0); const totalExp = months.reduce((a, b) => a + b.expense, 0); 
                
                container.innerHTML = `<div class="mb-6"><button onclick="app.setView('dashboard')" class="flex items-center text-gray-400 hover:text-white transition-colors mb-4 bg-dark-card border border-dark-border w-fit px-3 py-1.5 rounded-lg text-sm"><i class="fas fa-arrow-left mr-2"></i> Dashboard</button><div class="bg-dark-card border border-dark-border rounded-2xl p-5 md:p-6 shadow-sm"><div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-2"><div><h3 class="text-xl md:text-2xl font-bold text-white">${year} Performance</h3><p class="text-gray-400 text-sm mt-1">Net Savings: <span class="${totalInc >= totalExp ? 'text-emerald-400' : 'text-rose-400'} font-bold">$${this.fmt(totalInc - totalExp)}</span></p></div></div><div class="h-48 md:h-64 w-full"><canvas id="monthlyChart"></canvas></div></div></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4">${months.map(m => {
                    const net = m.income - m.expense;
                    return `<div class="bg-dark-card border border-dark-border p-4 rounded-xl flex justify-between items-center hover:border-brand-500/30 transition-colors"><div class="font-bold text-white text-lg w-16">${m.name}</div><div class="text-right"><div class="text-emerald-400 text-sm font-mono">+ $${this.fmt(m.income)}</div><div class="text-[9px] text-gray-500 font-mono mb-1">₹${this.fmt(m.income*ir)} • रू${this.fmt(m.income*nr)}</div><div class="text-rose-400 text-sm font-mono">- $${this.fmt(m.expense)}</div><div class="text-[9px] text-gray-500 font-mono">₹${this.fmt(m.expense*ir)} • रू${this.fmt(m.expense*nr)}</div><div class="border-t border-gray-700 mt-1.5 pt-1.5 text-[10px] md:text-xs text-gray-500 font-mono">Net: ${net >= 0 ? '+' : ''}${Math.round(net)} USD</div></div></div>`;
                }).join('')}</div>`; 
                
                setTimeout(() => { const ctx = document.getElementById('monthlyChart').getContext('2d'); new Chart(ctx, { type: 'bar', data: { labels: months.map(m => m.name), datasets: [ { label: 'Income', data: months.map(m => m.income), backgroundColor: '#10b981', borderRadius: 4 }, { label: 'Expense', data: months.map(m => m.expense), backgroundColor: '#ef4444', borderRadius: 4 } ] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }, x: { grid: { display: false }, ticks: { color: '#94a3b8', font: {size: 10} } } }, plugins: { legend: { position: 'top', labels: { color: '#e2e8f0', usePointStyle: true, boxWidth: 8 } } } } }); }, 50); 
            }

            deleteCategory(id) { if(id===DAD_UDHAAR_ID)return alert('System Category'); if(confirm('Delete Category?')) { this.data.categories=this.data.categories.filter(c=>c.id!==id); this.save(); } }
            addCategory(e) { e.preventDefault(); const f=e.target, t=f.type.value; this.data.categories.push({id:'cat_'+Date.now(), name:f.name.value, type:t, color:t==='productive'?'#10b981':(t==='waste'?'#ef4444':'#6366f1')}); this.save(); f.reset(); }
            quickAddCategory() { const n=prompt("Category Name:"); if(n){ const t=confirm("Is this a productive expense? (OK for Yes, Cancel for Waste)")?'productive':'waste'; this.data.categories.push({id:'cat_'+Date.now(), name:n, type:t, color:t==='productive'?'#10b981':'#ef4444'}); this.save(); this.renderCategoryCheckboxes(); } }
            importData(e) { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=x=>{ try{const j=JSON.parse(x.target.result); if(j.transactions){this.data=j;this.save();alert('Data Imported and Synced to Cloud');}}catch(err){alert('Invalid File');} }; r.readAsText(f); }
            exportData() { const d="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(this.data,null,2)); const a=document.createElement('a'); a.href=d; a.download=`shahi_vault_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); }
        }
        
        const app = new FinanceApp();
    </script>
</body>
</html>
