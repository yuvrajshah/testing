<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahi Finance | V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9', // Sky blue
                            600: '#0284c7',
                            900: '#0c4a6e',
                        },
                        dark: {
                            bg: '#0f172a', // Slate 900
                            card: '#1e293b', // Slate 800
                            border: '#334155' // Slate 700
                        },
                        accent: {
                            prod: '#10b981', // Emerald
                            waste: '#ef4444', // Red
                            save: '#6366f1', // Indigo
                            recov: '#f59e0b', // Amber
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-dark {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: white;
            transition: all 0.2s;
        }

        .input-dark:focus {
            border-color: #0ea5e9;
            outline: none;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2);
        }
    </style>
</head>

<body class="h-screen overflow-hidden flex relative">

    <div id="lockScreen"
        class="absolute inset-0 z-[100] bg-dark-bg flex items-center justify-center transition-opacity duration-300">
        <div class="bg-dark-card p-8 rounded-2xl shadow-2xl border border-dark-border w-full max-w-md text-center">
            <div
                class="w-16 h-16 bg-brand-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-brand-500/30">
                <i class="fas fa-lock text-brand-500 text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Shahi Finance</h2>
            <p class="text-gray-400 text-sm mb-6">Enter your master key to decrypt your vault.</p>

            <form id="loginForm" class="space-y-4">
                <div class="relative">
                    <i class="fas fa-key absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="password" id="vaultPassword"
                        class="input-dark w-full pl-10 pr-4 py-3 rounded-lg text-center tracking-widest"
                        placeholder="••••••••" required>
                </div>

                <div class="flex items-center justify-start gap-2 text-sm text-gray-400 pb-2">
                    <input type="checkbox" id="rememberMe"
                        class="rounded bg-dark-bg border-gray-600 text-brand-500 focus:ring-brand-500 cursor-pointer w-4 h-4">
                    <label for="rememberMe" class="cursor-pointer select-none">Remember this device</label>
                </div>

                <button type="submit" id="loginBtn"
                    class="w-full bg-brand-600 hover:bg-brand-500 text-white py-3 rounded-lg font-medium shadow-lg shadow-brand-500/20 transition-all flex justify-center items-center gap-2">
                    <span>Unlock Vault</span>
                </button>
                <p id="loginError" class="text-rose-500 text-sm hidden mt-2">Incorrect password or network error.</p>
            </form>
        </div>
    </div>

    <aside id="mainSidebar"
        class="w-64 bg-dark-card border-r border-dark-border flex-col hidden md:flex z-20 transition-opacity">
        <div class="p-6 border-b border-dark-border flex items-center gap-3">
            <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center text-white font-bold text-xl">
                <i class="fas fa-vault"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white">Shahi Finance</h1>
        </div>

        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="app.setView('dashboard')"
                class="nav-item w-full flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition-all active-nav">
                <i class="fas fa-chart-pie w-5"></i> Dashboard
            </button>
            <button onclick="app.setView('transactions')"
                class="nav-item w-full flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition-all">
                <i class="fas fa-list w-5"></i> Transactions
            </button>
            <button onclick="app.setView('categories')"
                class="nav-item w-full flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition-all">
                <i class="fas fa-tags w-5"></i> Categories
            </button>
            <div class="pt-4 mt-4 border-t border-dark-border">
                <div class="px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Data Control</div>
                <button onclick="document.getElementById('importFile').click()"
                    class="w-full flex items-center gap-3 px-4 py-3 text-brand-500 hover:bg-brand-500/10 rounded-lg transition-all">
                    <i class="fas fa-file-import w-5"></i> Import JSON
                </button>
                <input type="file" id="importFile" hidden accept=".json">
                <button onclick="app.exportData()"
                    class="w-full flex items-center gap-3 px-4 py-3 text-brand-500 hover:bg-brand-500/10 rounded-lg transition-all">
                    <i class="fas fa-download w-5"></i> Backup / Export
                </button>
                <button onclick="app.logout()"
                    class="w-full flex items-center gap-3 px-4 py-3 text-rose-500 hover:bg-rose-500/10 rounded-lg transition-all mt-2">
                    <i class="fas fa-sign-out-alt w-5"></i> Lock Vault
                </button>
            </div>
        </nav>

        <div class="p-4 border-t border-dark-border">
            <button onclick="app.openSettings()"
                class="w-full flex items-center justify-between px-4 py-2 bg-dark-bg border border-dark-border rounded-lg text-sm text-gray-300 hover:text-white hover:border-brand-500 transition-colors">
                <span><i class="fas fa-cog mr-2"></i> Exchange Rates</span>
            </button>
        </div>
    </aside>

    <main id="mainContent" class="flex-1 flex flex-col h-full relative overflow-hidden hidden">
        <header
            class="h-16 border-b border-dark-border bg-dark-card/50 backdrop-blur flex items-center justify-between px-6 z-10">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-gray-400 hover:text-white"><i class="fas fa-bars text-xl"></i></button>
                <h2 id="pageTitle" class="text-lg font-semibold text-white">Dashboard</h2>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="app.openTransactionModal()"
                    class="bg-brand-600 hover:bg-brand-500 text-white px-4 py-2 rounded-lg font-medium shadow-lg shadow-brand-500/20 transition-all flex items-center gap-2">
                    <i class="fas fa-plus"></i> New Transaction
                </button>
            </div>
        </header>

        <div id="contentArea" class="flex-1 overflow-y-auto p-6 scroll-smooth pb-20"></div>
    </main>

    <div id="transactionModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="app.closeModal()"></div>
        <div
            class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-2xl bg-dark-card border border-dark-border rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-dark-border flex justify-between items-center">
                <h3 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-receipt text-brand-500"></i> <span id="modalTitle">New Transaction</span>
                </h3>
                <button onclick="app.closeModal()" class="text-gray-400 hover:text-white"><i
                        class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto custom-scrollbar">
                <form id="transactionForm" onsubmit="app.handleTransactionSubmit(event)">
                    <input type="hidden" id="editId">
                    <div class="grid grid-cols-2 gap-4 mb-6 p-1 bg-dark-bg rounded-lg border border-dark-border">
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="in" class="peer sr-only" checked
                                onchange="app.toggleFormType('in')">
                            <div
                                class="text-center py-2 rounded-md peer-checked:bg-accent-prod peer-checked:text-white text-gray-400 font-medium transition-all">
                                <i class="fas fa-arrow-down mr-2"></i> Money In</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="out" class="peer sr-only"
                                onchange="app.toggleFormType('out')">
                            <div
                                class="text-center py-2 rounded-md peer-checked:bg-accent-waste peer-checked:text-white text-gray-400 font-medium transition-all">
                                <i class="fas fa-arrow-up mr-2"></i> Expenditure</div>
                        </label>
                    </div>
                    <div id="moneyInFields" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-400 mb-1">Gross Amount</label>
                                <div class="flex"><input type="number" id="grossAmount" step="0.01"
                                        class="input-dark w-full rounded-l-lg px-4 py-2" placeholder="0.00"><select
                                        id="grossCurrency"
                                        class="input-dark rounded-r-lg px-2 border-l-0 bg-dark-bg text-sm">
                                        <option value="usd">USD</option>
                                        <option value="inr">INR</option>
                                        <option value="npr">NPR</option>
                                    </select></div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-400 mb-1">Net Amount</label>
                                <div class="flex"><input type="number" id="netAmount" step="0.01"
                                        class="input-dark w-full rounded-l-lg px-4 py-2" placeholder="0.00"><select
                                        id="netCurrency"
                                        class="input-dark rounded-r-lg px-2 border-l-0 bg-dark-bg text-sm">
                                        <option value="usd">USD</option>
                                        <option value="inr">INR</option>
                                        <option value="npr">NPR</option>
                                    </select></div>
                            </div>
                        </div>
                        <div
                            class="bg-dark-bg/50 p-3 rounded border border-dark-border flex justify-between items-center text-sm">
                            <span class="text-gray-400">Calculated Fees:</span><span
                                class="font-mono font-bold text-accent-waste" id="liveFeeCalc">0.00 USD</span></div>
                    </div>
                    <div id="moneyOutFields" class="space-y-4 hidden">
                        <div><label class="block text-sm font-medium text-gray-400 mb-1">Expense Name</label><input
                                type="text" id="expenseName" class="input-dark w-full rounded-lg px-4 py-2"
                                placeholder="e.g. Server Hosting"></div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Amount</label>
                            <div class="flex"><input type="number" id="expenseAmount" step="0.01"
                                    class="input-dark w-full rounded-l-lg px-4 py-2" placeholder="0.00"><select
                                    id="expenseCurrency"
                                    class="input-dark rounded-r-lg px-2 border-l-0 bg-dark-bg text-sm">
                                    <option value="npr">NPR</option>
                                    <option value="usd">USD</option>
                                    <option value="inr">INR</option>
                                </select></div>
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-2"><label
                                    class="block text-sm font-medium text-gray-400">Categories</label><button
                                    type="button" onclick="app.quickAddCategory()"
                                    class="text-xs text-brand-500 hover:text-brand-400">+ New</button></div>
                            <div id="categoryCheckboxes"
                                class="grid grid-cols-2 gap-2 max-h-32 overflow-y-auto p-2 bg-dark-bg rounded border border-dark-border">
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 space-y-4">
                        <div><label class="block text-sm font-medium text-gray-400 mb-1">Date</label><input
                                type="datetime-local" id="transDate" class="input-dark w-full rounded-lg px-4 py-2">
                        </div>
                        <div><label class="block text-sm font-medium text-gray-400 mb-1">Description</label><textarea
                                id="description" rows="2" class="input-dark w-full rounded-lg px-4 py-2"
                                placeholder="Optional notes..."></textarea></div>
                    </div>
                    <div class="mt-8 flex gap-3">
                        <button type="button" onclick="app.closeModal()"
                            class="px-6 py-2 rounded-lg border border-dark-border text-gray-300 hover:bg-dark-bg transition-colors">Cancel</button>
                        <button type="submit" id="saveTransactionBtn"
                            class="flex-1 bg-brand-600 hover:bg-brand-500 text-white py-2 rounded-lg font-medium shadow-lg shadow-brand-500/20 transition-all">Save
                            Transaction</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"
            onclick="document.getElementById('settingsModal').classList.add('hidden')"></div>
        <div
            class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-sm bg-dark-card border border-dark-border rounded-xl shadow-2xl p-6">
            <h3 class="text-xl font-bold text-white mb-4">Currency Settings</h3>
            <div class="space-y-4">
                <div><label class="block text-sm font-medium text-gray-400 mb-1">1 USD = ? INR</label><input
                        type="number" id="setUsdToInr" class="input-dark w-full rounded-lg px-4 py-2" step="0.01"></div>
                <div><label class="block text-sm font-medium text-gray-400 mb-1">1 USD = ? NPR</label><input
                        type="number" id="setUsdToNpr" class="input-dark w-full rounded-lg px-4 py-2" step="0.01"></div>
                <button onclick="app.saveSettings()"
                    class="w-full bg-brand-600 hover:bg-brand-500 text-white py-2 rounded-lg font-medium">Save
                    Rates</button>
            </div>
        </div>
    </div>

    <script>
        const DAD_UDHAAR_ID = "cat_1762946534522";
        const BIN_ID = "69a163dd43b1c97be9a30026";
        const API_KEY = "$2a$10$d3j4cE6hPJ6QJ19dGBO3weaZllK12qHJ.fKbRhm6RRZHiewtvbzm6";
        const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        class FinanceApp {
            constructor() {
                this.data = {
                    transactions: [],
                    categories: [],
                    currencyRates: { usdToInr: 90, usdToNpr: 144 }
                };
                this.currentView = 'dashboard';
                this.viewParams = {};
                this.filterState = { search: '', dateStart: '', dateEnd: '', category: 'all', type: 'all' };
                this.vaultKey = null;
                this.init();
            }

            init() {
                // Setup login form listener
                document.getElementById('loginForm').addEventListener('submit', (e) => this.login(e));
                document.getElementById('importFile').addEventListener('change', (e) => this.importData(e));

                // Check for remembered device
                const savedKey = localStorage.getItem('shahi_vault_key');
                if (savedKey) {
                    document.getElementById('vaultPassword').value = savedKey;
                    document.getElementById('rememberMe').checked = true;
                    this.login(new Event('submit'));
                }
            }

            async login(e) {
                if (e) e.preventDefault();
                const pwdInput = document.getElementById('vaultPassword').value;
                const btn = document.getElementById('loginBtn');
                const errorMsg = document.getElementById('loginError');

                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Decrypting...';
                errorMsg.classList.add('hidden');

                try {
                    const response = await fetch(BIN_URL, {
                        headers: { 'X-Master-Key': API_KEY }
                    });

                    if (!response.ok) throw new Error("Failed to fetch data from cloud.");

                    const result = await response.json();

                    // If bin is completely empty, initialize it
                    if (!result.record || Object.keys(result.record).length === 0 || !result.record.data) {
                        this.vaultKey = pwdInput;
                        this.handleSuccessfulLogin();
                        return;
                    }

                    const encryptedData = result.record.data;
                    const bytes = CryptoJS.AES.decrypt(encryptedData, pwdInput);
                    const decryptedString = bytes.toString(CryptoJS.enc.Utf8);

                    if (!decryptedString) throw new Error("Incorrect Password");

                    this.data = { ...this.data, ...JSON.parse(decryptedString) };
                    this.vaultKey = pwdInput;
                    this.handleSuccessfulLogin();

                } catch (error) {
                    btn.innerHTML = 'Unlock Vault';
                    errorMsg.textContent = error.message.includes("Incorrect") ? "Incorrect password." : "Network or decryption error.";
                    errorMsg.classList.remove('hidden');
                    console.error(error);
                }
            }

            handleSuccessfulLogin() {
                // Save key if requested
                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('shahi_vault_key', this.vaultKey);
                } else {
                    localStorage.removeItem('shahi_vault_key');
                }

                // Hide lock screen
                const lockScreen = document.getElementById('lockScreen');
                lockScreen.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => lockScreen.classList.add('hidden'), 300);

                // Show app UI
                document.getElementById('mainSidebar').classList.remove('hidden');
                document.getElementById('mainSidebar').classList.add('flex');
                document.getElementById('mainContent').classList.remove('hidden');

                this.setView('dashboard');
                this.setupLiveCalc();
            }

            logout() {
                this.vaultKey = null;
                this.data = { transactions: [], categories: [], currencyRates: { usdToInr: 90, usdToNpr: 144 } };
                document.getElementById('vaultPassword').value = '';
                localStorage.removeItem('shahi_vault_key');

                document.getElementById('mainSidebar').classList.add('hidden');
                document.getElementById('mainContent').classList.add('hidden');

                const lockScreen = document.getElementById('lockScreen');
                lockScreen.classList.remove('hidden');
                setTimeout(() => lockScreen.classList.remove('opacity-0', 'pointer-events-none'), 10);
                document.getElementById('loginBtn').innerHTML = 'Unlock Vault';
            }

            async save() {
                // Change UI to show saving state (optional but good practice)
                const saveBtn = document.getElementById('saveTransactionBtn');
                if (saveBtn) {
                    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                    saveBtn.disabled = true;
                }

                try {
                    const stringifiedData = JSON.stringify(this.data);
                    const encryptedData = CryptoJS.AES.encrypt(stringifiedData, this.vaultKey).toString();

                    await fetch(BIN_URL, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': API_KEY
                        },
                        body: JSON.stringify({ data: encryptedData })
                    });

                    this.refreshCurrentView();
                } catch (err) {
                    alert("Failed to sync to cloud. Please check your network connection.");
                    console.error(err);
                } finally {
                    if (saveBtn) {
                        saveBtn.innerHTML = 'Save Transaction';
                        saveBtn.disabled = false;
                    }
                }
            }

            setView(view, params = {}) {
                this.currentView = view;
                this.viewParams = params;

                document.querySelectorAll('.nav-item').forEach(el => {
                    el.classList.remove('bg-white/5', 'text-white');
                    el.classList.add('text-gray-400');
                    if (view !== 'yearDetails' && el.textContent.toLowerCase().includes(view)) {
                        el.classList.add('bg-white/5', 'text-white');
                        el.classList.remove('text-gray-400');
                    }
                });

                const content = document.getElementById('contentArea');

                if (view === 'dashboard') {
                    document.getElementById('pageTitle').textContent = 'Dashboard';
                    this.renderDashboard(content);
                } else if (view === 'transactions') {
                    document.getElementById('pageTitle').textContent = 'All Transactions';
                    this.renderTransactions(content);
                } else if (view === 'categories') {
                    document.getElementById('pageTitle').textContent = 'Category Management';
                    this.renderCategories(content);
                } else if (view === 'yearDetails') {
                    document.getElementById('pageTitle').textContent = `${params.year} Monthly Breakdown`;
                    this.renderYearDetails(content, params.year);
                }
            }

            refreshCurrentView() { this.setView(this.currentView, this.viewParams); }

            /* --- DASHBOARD --- */
            renderDashboard(container) {
                const allStats = this.calculateStats('all');
                const years = [...new Set(this.data.transactions.map(t => new Date(t.date).getFullYear()))].sort((a, b) => b - a);
                if (years.length === 0) years.push(new Date().getFullYear());
                const yearsHtml = years.map(year => this.renderYearlyCard(year)).join('');

                const grossTotal = Math.max(1, allStats.grossIn.usd);
                const pFees = ((allStats.fees.usd / grossTotal) * 100).toFixed(1);
                const pProd = ((allStats.productive.usd / grossTotal) * 100).toFixed(1);
                const pWaste = ((allStats.waste.usd / grossTotal) * 100).toFixed(1);

                container.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
                        <div class="lg:col-span-4 bg-gradient-to-r from-brand-900 to-brand-600 rounded-2xl p-8 shadow-xl relative overflow-hidden border border-brand-500/30">
                            <div class="absolute right-0 top-0 opacity-10 transform translate-x-10 -translate-y-10"><i class="fas fa-wallet text-9xl text-white"></i></div>
                            <h3 class="text-brand-100 font-medium mb-2">Total Available Balance</h3>
                            <div class="flex items-baseline gap-4">
                                <span class="text-5xl font-bold text-white">$${this.fmt(allStats.balance.usd)}</span>
                                <span class="text-xl text-brand-200">USD</span>
                            </div>
                            <div class="mt-4 flex gap-6 text-sm text-brand-100/80 font-mono">
                                <span>₹ ${this.fmt(allStats.balance.inr)} INR</span>
                                <span>Rs ${this.fmt(allStats.balance.npr)} NPR</span>
                            </div>
                        </div>
                        <div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-4">
                            ${this.statCard('Gross Money In', allStats.grossIn.usd, 'text-accent-prod', 'fa-arrow-down')}
                            ${this.statCard('Fees Paid', allStats.fees.usd, 'text-accent-waste', 'fa-receipt')}
                            ${this.statCard('Total Expense', allStats.netIn.usd, 'text-brand-400', 'fa-shopping-cart')}
                            ${this.statCard('Productive', allStats.productive.usd, 'text-emerald-400', 'fa-check-circle')}
                            ${this.statCard('Waste', allStats.waste.usd, 'text-rose-400', 'fa-trash')}
                            ${this.statCard('Dad Loan', allStats.dadUdhaar.usd, 'text-green-400', 'fa-hand-holding-usd')}
                        </div>
                        <div class="lg:col-span-1 bg-dark-card border border-dark-border rounded-xl p-5 flex flex-col items-center justify-center">
                            <h4 class="text-gray-400 text-sm font-medium mb-4 w-full text-left">Gross Income Distribution</h4>
                            <div class="relative w-48 h-48">
                                <canvas id="distChart"></canvas>
                                <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                    <div class="text-[10px] text-emerald-400 font-bold">${pProd}% Prod</div>
                                    <div class="text-[10px] text-rose-400 font-bold">${pWaste}% Waste</div>
                                    <div class="text-[10px] text-orange-400 font-bold">${pFees}% Fees</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-6">${yearsHtml}</div>
                `;

                setTimeout(() => {
                    const ctx = document.getElementById('distChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Productive', 'Waste', 'Fees'],
                            datasets: [{
                                data: [allStats.productive.usd, allStats.waste.usd, allStats.fees.usd],
                                backgroundColor: ['#10b981', '#ef4444', '#fb923c'],
                                borderWidth: 0,
                                cutout: '65%'
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }, 50);
            }

            renderYearlyCard(year) {
                const yearStats = this.calculateStats(year);
                return `
                    <div class="glass-panel rounded-xl p-6 border border-dark-border transition-all hover:border-brand-500/50">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-bold text-white">Yearly Overview (${year})</h3>
                            <button onclick="app.setView('yearDetails', {year: ${year}})" class="text-xs bg-brand-600/20 text-brand-400 border border-brand-500/30 px-3 py-1 rounded hover:bg-brand-600 hover:text-white transition-all">
                                View Monthly Breakdown <i class="fas fa-arrow-right ml-1"></i>
                            </button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div class="bg-dark-bg p-4 rounded-lg border border-dark-border border-l-4 border-l-emerald-500">
                                <div class="text-gray-400 text-xs uppercase mb-1">Productive</div>
                                <div class="text-xl font-bold text-emerald-400">$${this.fmt(yearStats.productive.usd)}</div>
                            </div>
                            <div class="bg-dark-bg p-4 rounded-lg border border-dark-border border-l-4 border-l-rose-500">
                                <div class="text-gray-400 text-xs uppercase mb-1">Waste</div>
                                <div class="text-xl font-bold text-rose-400">$${this.fmt(yearStats.waste.usd)}</div>
                            </div>
                            <div class="bg-dark-bg p-4 rounded-lg border border-dark-border border-l-4 border-l-green-500">
                                <div class="text-gray-400 text-xs uppercase mb-1">Dad Loan</div>
                                <div class="text-xl font-bold text-green-400">$${this.fmt(yearStats.dadUdhaar.usd)}</div>
                            </div>
                            <div class="bg-dark-bg p-4 rounded-lg border border-dark-border border-l-4 border-l-indigo-500">
                                <div class="text-gray-400 text-xs uppercase mb-1">Total Spent</div>
                                <div class="text-xl font-bold text-indigo-400">$${this.fmt(yearStats.expense.usd)}</div>
                                <div class="flex gap-3 text-[11px] font-medium mt-1">
                                    <span class="text-emerald-500">${yearStats.ratios.prod}% Prod</span>
                                    <span class="text-rose-500">${yearStats.ratios.waste}% Waste</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderYearDetails(container, year) {
                const months = Array.from({ length: 12 }, (_, i) => ({
                    index: i, name: new Date(0, i).toLocaleString('en-US', { month: 'short' }), income: 0, expense: 0
                }));

                const txs = this.data.transactions.filter(t => new Date(t.date).getFullYear() === year);
                txs.forEach(t => {
                    const mIndex = new Date(t.date).getMonth();
                    if (t.type === 'in') months[mIndex].income += t.netAmount.usd;
                    else months[mIndex].expense += t.amount.usd;
                });

                const totalInc = months.reduce((a, b) => a + b.income, 0);
                const totalExp = months.reduce((a, b) => a + b.expense, 0);

                container.innerHTML = `
                    <div class="mb-6">
                        <button onclick="app.setView('dashboard')" class="flex items-center text-gray-400 hover:text-white transition-colors mb-4">
                            <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
                        </button>
                        <div class="bg-dark-card border border-dark-border rounded-xl p-6">
                            <div class="flex justify-between items-end mb-6">
                                <div>
                                    <h3 class="text-2xl font-bold text-white">${year} Performance</h3>
                                    <p class="text-gray-400 text-sm">Net Savings: <span class="${totalInc >= totalExp ? 'text-emerald-400' : 'text-rose-400'} font-bold">$${this.fmt(totalInc - totalExp)}</span></p>
                                </div>
                            </div>
                            <div class="h-64 w-full"><canvas id="monthlyChart"></canvas></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${months.map(m => `
                            <div class="bg-dark-bg border border-dark-border p-4 rounded-lg flex justify-between items-center hover:border-brand-500/30 transition-colors">
                                <div class="font-bold text-white text-lg w-16">${m.name}</div>
                                <div class="text-right">
                                    <div class="text-emerald-400 text-sm font-mono">+ $${this.fmt(m.income)}</div>
                                    <div class="text-rose-400 text-sm font-mono">- $${this.fmt(m.expense)}</div>
                                    <div class="border-t border-gray-700 mt-1 pt-1 text-xs text-gray-500 font-mono">
                                        Net: ${m.income >= m.expense ? '+' : ''}${Math.round(m.income - m.expense)}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;

                setTimeout(() => {
                    const ctx = document.getElementById('monthlyChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: months.map(m => m.name),
                            datasets: [
                                { label: 'Income', data: months.map(m => m.income), backgroundColor: '#10b981', borderRadius: 4 },
                                { label: 'Expense', data: months.map(m => m.expense), backgroundColor: '#ef4444', borderRadius: 4 }
                            ]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            scales: { y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } },
                            plugins: { legend: { labels: { color: '#e2e8f0' } } }
                        }
                    });
                }, 50);
            }

            renderTransactions(container) {
                let list = [...this.data.transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
                if (this.filterState.search) list = list.filter(t => (t.name || t.description || '').toLowerCase().includes(this.filterState.search.toLowerCase()));
                if (this.filterState.type !== 'all') list = list.filter(t => t.type === this.filterState.type);
                if (this.filterState.category !== 'all') list = list.filter(t => t.categories && t.categories.includes(this.filterState.category));

                container.innerHTML = `
                    <div class="mb-6 flex flex-wrap gap-4 bg-dark-card p-4 rounded-xl border border-dark-border">
                        <div class="flex-1 min-w-[200px]"><div class="relative"><i class="fas fa-search absolute left-3 top-3 text-gray-500"></i><input type="text" placeholder="Search..." class="input-dark w-full pl-10 pr-4 py-2 rounded-lg" oninput="app.filterState.search = this.value; app.refreshCurrentView()" value="${this.filterState.search}"></div></div>
                        <select class="input-dark rounded-lg px-4 py-2" onchange="app.filterState.type = this.value; app.refreshCurrentView()"><option value="all">All Types</option><option value="in" ${this.filterState.type === 'in' ? 'selected' : ''}>Money In</option><option value="out" ${this.filterState.type === 'out' ? 'selected' : ''}>Money Out</option></select>
                        <select class="input-dark rounded-lg px-4 py-2" onchange="app.filterState.category = this.value; app.refreshCurrentView()"><option value="all">All Categories</option>${this.data.categories.map(c => `<option value="${c.id}" ${this.filterState.category === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}</select>
                    </div>
                    <div class="space-y-3">${list.length === 0 ? '<div class="text-center text-gray-500 py-10">No transactions</div>' : ''}${list.map(t => this.transactionRow(t)).join('')}</div>
                `;
            }

            transactionRow(t) {
                const isIn = t.type === 'in';
                const date = new Date(t.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const amt = isIn ? `+$${this.fmt(t.netAmount.usd)}` : `-$${this.fmt(t.amount.usd)}`;
                const sub = isIn ? `Fee: $${this.fmt(t.fees.usd)}` : `${this.fmt(t.amount.npr)} NPR`;
                let badges = !isIn && t.categories ? t.categories.map(id => { const c = this.data.categories.find(x => x.id === id); return c ? `<span class="text-[10px] px-2 py-0.5 rounded border" style="border-color:${c.color}; color:${c.color}">${c.name}</span>` : ''; }).join(' ') : '';

                return `<div class="bg-dark-card border border-dark-border rounded-lg p-4 flex flex-col md:flex-row items-center justify-between hover:bg-dark-border/50 transition-colors group">
                    <div class="flex items-center gap-4 w-full md:w-auto"><div class="w-10 h-10 rounded-full flex items-center justify-center ${isIn ? 'bg-emerald-500/10 text-emerald-500' : 'bg-rose-500/10 text-rose-500'}"><i class="fas ${isIn ? 'fa-arrow-down' : 'fa-arrow-up'}"></i></div>
                    <div><div class="font-medium text-white">${t.name || (isIn ? 'Income' : 'Expense')}</div><div class="text-xs text-gray-500 flex gap-2 mt-1"><span>${date}</span> ${badges}</div></div></div>
                    <div class="flex items-center gap-6 w-full md:w-auto justify-between mt-2 md:mt-0"><div class="text-right"><div class="font-bold font-mono ${isIn ? 'text-emerald-400' : 'text-rose-400'} text-lg">${amt}</div><div class="text-xs text-gray-500 font-mono">${sub}</div></div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity"><button onclick="app.editTransaction('${t.id}')" class="w-8 h-8 rounded bg-dark-bg border border-dark-border text-brand-400 hover:bg-brand-600 hover:text-white"><i class="fas fa-pencil-alt"></i></button><button onclick="app.deleteTransaction('${t.id}')" class="w-8 h-8 rounded bg-dark-bg border border-dark-border text-rose-400 hover:bg-rose-600 hover:text-white"><i class="fas fa-trash-alt"></i></button></div></div></div>`;
            }

            renderCategories(container) {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="bg-dark-card rounded-xl p-6 border border-dark-border"><h3 class="font-bold text-white mb-4">Add Category</h3><form onsubmit="app.addCategory(event)" class="flex gap-2"><input type="text" name="name" placeholder="Name" class="input-dark flex-1 rounded-lg px-4 py-2" required><select name="type" class="input-dark rounded-lg px-4 py-2"><option value="productive">Productive</option><option value="waste">Waste</option><option value="recoverable">Recoverable</option></select><button type="submit" class="bg-brand-600 text-white px-4 py-2 rounded-lg hover:bg-brand-500"><i class="fas fa-plus"></i></button></form></div>
                    <div class="col-span-1 md:col-span-2 grid grid-cols-1 sm:grid-cols-3 gap-4">${this.data.categories.map(c => `<div class="bg-dark-bg border border-dark-border p-4 rounded-lg flex justify-between items-center" style="border-left: 4px solid ${c.color}"><div><div class="font-bold text-white">${c.name}</div><div class="text-xs text-gray-500 capitalize">${c.type}</div></div><button onclick="app.deleteCategory('${c.id}')" class="text-gray-600 hover:text-rose-500"><i class="fas fa-trash"></i></button></div>`).join('')}</div></div>`;
            }

            statCard(title, val, color, icon) { return `<div class="bg-dark-card border border-dark-border rounded-xl p-5 flex items-center justify-between"><div><p class="text-gray-400 text-xs font-semibold uppercase mb-1">${title}</p><p class="text-xl font-bold text-white">$${this.fmt(val)}</p><p class="text-xs text-gray-500 mt-1">₹${this.fmt(val * this.data.currencyRates.usdToInr)} • Rs ${this.fmt(val * this.data.currencyRates.usdToNpr)}</p></div><div class="w-10 h-10 rounded-full bg-dark-bg flex items-center justify-center border border-dark-border"><i class="fas ${icon} ${color}"></i></div></div>`; }

            calculateStats(scope) {
                let txs = this.data.transactions;
                if (typeof scope === 'number') txs = txs.filter(t => new Date(t.date).getFullYear() === scope);
                const stats = { grossIn: { usd: 0 }, fees: { usd: 0 }, netIn: { usd: 0 }, expense: { usd: 0 }, productive: { usd: 0 }, waste: { usd: 0 }, dadUdhaar: { usd: 0 }, balance: { usd: 0, inr: 0, npr: 0 } };
                txs.forEach(t => {
                    if (t.type === 'in') { stats.grossIn.usd += t.grossAmount.usd; stats.fees.usd += t.fees.usd; stats.netIn.usd += t.netAmount.usd; }
                    else {
                        stats.expense.usd += t.amount.usd;
                        if (t.categories) {
                            if (t.categories.includes(DAD_UDHAAR_ID)) stats.dadUdhaar.usd += (t.amount.usd / t.categories.length);
                            const split = t.amount.usd / t.categories.length;
                            t.categories.forEach(cid => { const c = this.data.categories.find(x => x.id === cid); if (c) { if (c.type === 'productive') stats.productive.usd += split; if (c.type === 'waste') stats.waste.usd += split; } });
                        } else stats.waste.usd += t.amount.usd;
                    }
                });
                stats.balance.usd = stats.netIn.usd - stats.expense.usd;
                stats.balance.inr = stats.balance.usd * this.data.currencyRates.usdToInr;
                stats.balance.npr = stats.balance.usd * this.data.currencyRates.usdToNpr;
                const totOut = Math.max(1, stats.expense.usd);
                stats.ratios = { prod: ((stats.productive.usd / totOut) * 100).toFixed(1), waste: ((stats.waste.usd / totOut) * 100).toFixed(1) };
                return stats;
            }

            openSettings() { document.getElementById('setUsdToInr').value = this.data.currencyRates.usdToInr; document.getElementById('setUsdToNpr').value = this.data.currencyRates.usdToNpr; document.getElementById('settingsModal').classList.remove('hidden'); }
            saveSettings() { const i = parseFloat(document.getElementById('setUsdToInr').value), n = parseFloat(document.getElementById('setUsdToNpr').value); if (i && n) { this.data.currencyRates = { usdToInr: i, usdToNpr: n }; this.save(); document.getElementById('settingsModal').classList.add('hidden'); } }
            openTransactionModal() { document.getElementById('transactionModal').classList.remove('hidden'); document.getElementById('modalTitle').textContent = "New Transaction"; document.getElementById('editId').value = ""; document.getElementById('transactionForm').reset(); document.getElementById('transDate').value = new Date().toISOString().slice(0, 16); document.querySelector('input[name="type"][value="in"]').click(); this.renderCategoryCheckboxes(); }
            closeModal() { document.getElementById('transactionModal').classList.add('hidden'); document.getElementById('transactionForm').reset(); }
            toggleFormType(t) { if (t === 'in') { document.getElementById('moneyInFields').classList.remove('hidden'); document.getElementById('moneyOutFields').classList.add('hidden'); } else { document.getElementById('moneyInFields').classList.add('hidden'); document.getElementById('moneyOutFields').classList.remove('hidden'); } }
            setupLiveCalc() { ['grossAmount', 'netAmount', 'grossCurrency', 'netCurrency'].forEach(id => document.getElementById(id).addEventListener('input', () => this.updateLiveFee())); }
            updateLiveFee() { const g = parseFloat(document.getElementById('grossAmount').value) || 0, n = parseFloat(document.getElementById('netAmount').value) || 0, gc = document.getElementById('grossCurrency').value, nc = document.getElementById('netCurrency').value; const fee = Math.max(0, this.convert(g, gc, 'usd') - this.convert(n, nc, 'usd')); document.getElementById('liveFeeCalc').textContent = `${this.fmt(fee)} USD`; }
            convert(amt, from, to) { if (from === 'usd') return amt; if (from === 'inr') return amt / this.data.currencyRates.usdToInr; if (from === 'npr') return amt / this.data.currencyRates.usdToNpr; return amt; }
            fmt(n) { return n ? n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '0.00'; }
            renderCategoryCheckboxes() { document.getElementById('categoryCheckboxes').innerHTML = this.data.categories.map(c => `<label class="flex items-center space-x-2 cursor-pointer hover:bg-white/5 p-1 rounded"><input type="checkbox" name="cats" value="${c.id}" class="form-checkbox text-brand-500 rounded bg-dark-bg border-gray-600"><span class="text-sm text-gray-300" style="color:${c.color}">${c.name}</span></label>`).join(''); }
            handleTransactionSubmit(e) { e.preventDefault(); const id = document.getElementById('editId').value, type = document.querySelector('input[name="type"]:checked').value, date = document.getElementById('transDate').value, desc = document.getElementById('description').value; let t = { id: id || 'trans_' + Date.now(), type, date, description: desc }; if (type === 'in') { const g = parseFloat(document.getElementById('grossAmount').value) || 0, n = parseFloat(document.getElementById('netAmount').value) || 0; const gu = this.convert(g, document.getElementById('grossCurrency').value, 'usd'), nu = this.convert(n, document.getElementById('netCurrency').value, 'usd'); t.grossAmount = this.makeAmt(gu); t.netAmount = this.makeAmt(nu); t.fees = this.makeAmt(Math.max(0, gu - nu)); } else { const nm = document.getElementById('expenseName').value, val = parseFloat(document.getElementById('expenseAmount').value) || 0, cats = Array.from(document.querySelectorAll('input[name="cats"]:checked')).map(cb => cb.value); t.name = nm; t.amount = this.makeAmt(this.convert(val, document.getElementById('expenseCurrency').value, 'usd')); t.categories = cats; } if (id) { const i = this.data.transactions.findIndex(x => x.id === id); if (i !== -1) this.data.transactions[i] = t; } else this.data.transactions.push(t); this.save(); this.closeModal(); }
            editTransaction(id) { const t = this.data.transactions.find(x => x.id === id); if (!t) return; this.openTransactionModal(); document.getElementById('modalTitle').textContent = "Edit Transaction"; document.getElementById('editId').value = t.id; document.getElementById('transDate').value = new Date(t.date).toISOString().slice(0, 16); document.getElementById('description').value = t.description || ''; document.querySelector(`input[name="type"][value="${t.type}"]`).click(); if (t.type === 'in') { document.getElementById('grossAmount').value = t.grossAmount.usd; document.getElementById('grossCurrency').value = 'usd'; document.getElementById('netAmount').value = t.netAmount.usd; document.getElementById('netCurrency').value = 'usd'; } else { document.getElementById('expenseName').value = t.name; document.getElementById('expenseAmount').value = t.amount.usd; document.getElementById('expenseCurrency').value = 'usd'; setTimeout(() => { t.categories.forEach(c => { const cb = document.querySelector(`input[name="cats"][value="${c}"]`); if (cb) cb.checked = true; }) }, 50); } }
            makeAmt(u) { return { usd: u, inr: u * this.data.currencyRates.usdToInr, npr: u * this.data.currencyRates.usdToNpr }; }
            deleteTransaction(id) { if (confirm('Delete?')) { this.data.transactions = this.data.transactions.filter(t => t.id !== id); this.save(); } }
            deleteCategory(id) { if (id === DAD_UDHAAR_ID) return alert('System Category'); if (confirm('Delete?')) { this.data.categories = this.data.categories.filter(c => c.id !== id); this.save(); } }
            addCategory(e) { e.preventDefault(); const f = e.target, t = f.type.value; this.data.categories.push({ id: 'cat_' + Date.now(), name: f.name.value, type: t, color: t === 'productive' ? '#10b981' : (t === 'waste' ? '#ef4444' : '#6366f1') }); this.save(); f.reset(); }
            quickAddCategory() { const n = prompt("Name:"); if (n) { const t = confirm("Productive?") ? 'productive' : 'waste'; this.data.categories.push({ id: 'cat_' + Date.now(), name: n, type: t, color: t === 'productive' ? '#10b981' : '#ef4444' }); this.save(); this.renderCategoryCheckboxes(); } }
            importData(e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = x => { try { const j = JSON.parse(x.target.result); if (j.transactions) { this.data = j; this.save(); alert('Imported'); } } catch (err) { alert('Invalid'); } }; r.readAsText(f); }
            exportData() { const d = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.data, null, 2)); const a = document.createElement('a'); a.href = d; a.download = `finance_backup_${new Date().toISOString().slice(0, 10)}.json`; a.click(); }
        }

        // Initialize App
        const app = new FinanceApp();
    </script>
</body>

</html>
