<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahi Health | Intelligent Health Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e', // Green
                            600: '#16a34a',
                            900: '#14532d',
                        },
                        dark: {
                            bg: '#0f172a', // Slate 900
                            card: '#1e293b', // Slate 800
                            border: '#334155' // Slate 700
                        },
                        accent: {
                            healthy: '#10b981', // Emerald
                            junk: '#ef4444', // Red
                            protein: '#3b82f6', // Blue
                            balanced: '#8b5cf6', // Violet
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-dark {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: white;
            transition: all 0.2s;
        }

        .input-dark:focus {
            border-color: #22c55e;
            outline: none;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
        }
        
        .progress-bar {
            transition: width 0.5s ease-in-out;
        }
    </style>
</head>

<body class="h-screen overflow-hidden flex">

    <aside class="w-64 bg-dark-card border-r border-dark-border flex flex-col hidden md:flex z-20">
        <div class="p-6 border-b border-dark-border flex items-center gap-3">
            <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center text-white font-bold text-xl">
                <i class="fas fa-heart-pulse"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white">Shahi Health</h1>
        </div>

        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="app.setView('dashboard')"
                class="nav-item w-full flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition-all active-nav">
                <i class="fas fa-chart-pie w-5"></i> Dashboard
            </button>
            <button onclick="app.setView('meals')"
                class="nav-item w-full flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition-all">
                <i class="fas fa-utensils w-5"></i> Food Log
            </button>
            <button onclick="app.setView('categories')"
                class="nav-item w-full flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition-all">
                <i class="fas fa-tags w-5"></i> Diet Types
            </button>
            <div class="pt-4 mt-4 border-t border-dark-border">
                <div class="px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Data Control</div>
                <button onclick="document.getElementById('importFile').click()"
                    class="w-full flex items-center gap-3 px-4 py-3 text-brand-500 hover:bg-brand-500/10 rounded-lg transition-all">
                    <i class="fas fa-file-import w-5"></i> Import JSON
                </button>
                <input type="file" id="importFile" hidden accept=".json">
                <button onclick="app.exportData()"
                    class="w-full flex items-center gap-3 px-4 py-3 text-brand-500 hover:bg-brand-500/10 rounded-lg transition-all">
                    <i class="fas fa-download w-5"></i> Backup / Export
                </button>
            </div>
        </nav>

        <div class="p-4 border-t border-dark-border">
            <button onclick="app.openSettings()"
                class="w-full flex items-center justify-between px-4 py-2 bg-dark-bg border border-dark-border rounded-lg text-sm text-gray-300 hover:text-white hover:border-brand-500 transition-colors">
                <span><i class="fas fa-bullseye mr-2"></i> Daily Targets</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden">

        <header
            class="h-16 border-b border-dark-border bg-dark-card/50 backdrop-blur flex items-center justify-between px-6 z-10">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-gray-400 hover:text-white"><i class="fas fa-bars text-xl"></i></button>
                <h2 id="pageTitle" class="text-lg font-semibold text-white">Health Dashboard</h2>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="app.openMealModal()"
                    class="bg-brand-600 hover:bg-brand-500 text-white px-4 py-2 rounded-lg font-medium shadow-lg shadow-brand-500/20 transition-all flex items-center gap-2">
                    <i class="fas fa-plus"></i> Log Meal
                </button>
            </div>
        </header>

        <div id="contentArea" class="flex-1 overflow-y-auto p-6 scroll-smooth pb-20">
        </div>

    </main>

    <div id="mealModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="app.closeModal()"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-2xl bg-dark-card border border-dark-border rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-dark-border flex justify-between items-center">
                <h3 class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-utensils text-brand-500"></i> <span id="modalTitle">Log Meal</span>
                </h3>
                <button onclick="app.closeModal()" class="text-gray-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>

            <div class="p-6 overflow-y-auto custom-scrollbar">
                <form id="mealForm" onsubmit="app.handleMealSubmit(event)">
                    <input type="hidden" id="editId">

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Meal Name</label>
                            <input type="text" id="mealName" class="input-dark w-full rounded-lg px-4 py-2" placeholder="e.g. Grilled Chicken Salad" required>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-400 mb-1">Calories (kcal)</label>
                                <input type="number" id="mealCalories" class="input-dark w-full rounded-lg px-4 py-2" placeholder="0" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-400 mb-1">Protein (g)</label>
                                <input type="number" id="mealProtein" class="input-dark w-full rounded-lg px-4 py-2" placeholder="0">
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label class="block text-sm font-medium text-gray-400">Dietary Categories</label>
                                <button type="button" onclick="app.quickAddCategory()" class="text-xs text-brand-500 hover:text-brand-400">+ New Category</button>
                            </div>
                            <div id="categoryCheckboxes" class="grid grid-cols-2 gap-2 max-h-32 overflow-y-auto p-2 bg-dark-bg rounded border border-dark-border">
                                </div>
                            <p class="text-xs text-gray-500 mt-2">Selection affects your "Healthy vs Junk" score.</p>
                        </div>

                        <div class="grid grid-cols-1 gap-4">
                             <div>
                                <label class="block text-sm font-medium text-gray-400 mb-1">Date & Time</label>
                                <input type="datetime-local" id="mealDate" class="input-dark w-full rounded-lg px-4 py-2">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Description / Notes</label>
                            <textarea id="mealDescription" rows="2" class="input-dark w-full rounded-lg px-4 py-2" placeholder="Portion size, restaurant name, etc..."></textarea>
                        </div>
                    </div>

                    <div class="mt-8 flex gap-3">
                        <button type="button" onclick="app.closeModal()" class="px-6 py-2 rounded-lg border border-dark-border text-gray-300 hover:bg-dark-bg transition-colors">Cancel</button>
                        <button type="submit" class="flex-1 bg-brand-600 hover:bg-brand-500 text-white py-2 rounded-lg font-medium shadow-lg shadow-brand-500/20 transition-all">Save Log</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="document.getElementById('settingsModal').classList.add('hidden')"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full max-w-sm bg-dark-card border border-dark-border rounded-xl shadow-2xl p-6">
            <h3 class="text-xl font-bold text-white mb-4">Daily Targets</h3>
            <p class="text-sm text-gray-400 mb-4">Set your nutritional goals to calculate daily progress.</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Daily Calorie Target (kcal)</label>
                    <input type="number" id="targetCalories" class="input-dark w-full rounded-lg px-4 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Daily Protein Target (g)</label>
                    <input type="number" id="targetProtein" class="input-dark w-full rounded-lg px-4 py-2">
                </div>
                <button onclick="app.saveSettings()" class="w-full bg-brand-600 hover:bg-brand-500 text-white py-2 rounded-lg font-medium">Save Targets</button>
            </div>
        </div>
    </div>

    <script>
        class HealthApp {
            constructor() {
                this.data = {
                    meals: [],
                    categories: [
                        { id: 'cat_balanced', name: 'Balanced Diet', type: 'healthy', color: '#10b981' },
                        { id: 'cat_packet', name: 'Packet Food', type: 'junk', color: '#ef4444' },
                        { id: 'cat_fast', name: 'Fast Food', type: 'junk', color: '#f59e0b' },
                        { id: 'cat_oily', name: 'Oily/Fried', type: 'junk', color: '#ef4444' },
                        { id: 'cat_highpro', name: 'High Protein', type: 'healthy', color: '#3b82f6' },
                        { id: 'cat_veg', name: 'Vegetables', type: 'healthy', color: '#10b981' }
                    ],
                    targets: { calories: 2000, protein: 120 }
                };
                this.currentView = 'dashboard';
                this.filterState = { search: '', category: 'all' };

                this.init();
            }

            init() {
                const saved = localStorage.getItem('health_data');
                if (saved) {
                    try { this.data = { ...this.data, ...JSON.parse(saved) }; } 
                    catch (e) { console.error("Corrupt data", e); }
                }
                this.setView('dashboard');
                document.getElementById('importFile').addEventListener('change', (e) => this.importData(e));
            }

            save() {
                localStorage.setItem('health_data', JSON.stringify(this.data));
                this.refreshCurrentView();
            }

            setView(view) {
                this.currentView = view;
                document.querySelectorAll('.nav-item').forEach(el => {
                    el.classList.remove('bg-white/5', 'text-white');
                    el.classList.add('text-gray-400');
                    if (el.textContent.toLowerCase().includes(view === 'meals' ? 'food' : view)) {
                        el.classList.add('bg-white/5', 'text-white');
                        el.classList.remove('text-gray-400');
                    }
                });

                const content = document.getElementById('contentArea');
                if (view === 'dashboard') {
                    document.getElementById('pageTitle').textContent = 'Dashboard';
                    this.renderDashboard(content);
                } else if (view === 'meals') {
                    document.getElementById('pageTitle').textContent = 'Food Log';
                    this.renderMeals(content);
                } else if (view === 'categories') {
                    document.getElementById('pageTitle').textContent = 'Diet Categories';
                    this.renderCategories(content);
                }
            }

            refreshCurrentView() { this.setView(this.currentView); }

            /* --- DASHBOARD --- */
            renderDashboard(container) {
                // Determine scope: Default to TODAY for the main card, but show charts for overall?
                // The finance app showed "All Time" total balance. 
                // For health, "Total Balance" is weird. "Today's Status" is better for the big card.
                
                const today = new Date().toISOString().split('T')[0];
                const statsToday = this.calculateStats('day', today);
                const statsAll = this.calculateStats('all'); // For charts

                const calPercent = Math.min(100, (statsToday.calories / this.data.targets.calories) * 100);
                const proPercent = Math.min(100, (statsToday.protein / this.data.targets.protein) * 100);
                
                // Color logic for calories: Green if under target, Red if over
                const calColor = statsToday.calories > this.data.targets.calories ? 'text-rose-400' : 'text-emerald-400';
                
                // Ratios for Diet Quality (All Time)
                const totalCals = Math.max(1, statsAll.calories);
                const pHealthy = ((statsAll.healthyCal / totalCals) * 100).toFixed(1);
                const pJunk = ((statsAll.junkCal / totalCals) * 100).toFixed(1);
                const pNeutral = ((statsAll.neutralCal / totalCals) * 100).toFixed(1);

                // Yearly Cards
                const years = [...new Set(this.data.meals.map(t => new Date(t.date).getFullYear()))].sort((a, b) => b - a);
                if (years.length === 0) years.push(new Date().getFullYear());
                const yearsHtml = years.map(year => this.renderYearlyCard(year)).join('');

                container.innerHTML = `
                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
                        <div class="lg:col-span-4 bg-gradient-to-r from-brand-900 to-brand-600 rounded-2xl p-8 shadow-xl relative overflow-hidden border border-brand-500/30">
                            <div class="absolute right-0 top-0 opacity-10 transform translate-x-10 -translate-y-10">
                                <i class="fas fa-apple-alt text-9xl text-white"></i>
                            </div>
                            <h3 class="text-brand-100 font-medium mb-2">Today's Consumption</h3>
                            <div class="flex items-baseline gap-4">
                                <span class="text-5xl font-bold text-white">${Math.round(statsToday.calories)}</span>
                                <span class="text-xl text-brand-200">/ ${this.data.targets.calories} kcal</span>
                            </div>
                            
                            <div class="mt-6 space-y-4 max-w-2xl">
                                <div>
                                    <div class="flex justify-between text-xs text-brand-100 mb-1">
                                        <span>Calories</span>
                                        <span>${Math.round(calPercent)}%</span>
                                    </div>
                                    <div class="w-full bg-black/20 rounded-full h-2">
                                        <div class="bg-white h-2 rounded-full progress-bar" style="width: ${calPercent}%"></div>
                                    </div>
                                </div>
                                <div>
                                    <div class="flex justify-between text-xs text-brand-100 mb-1">
                                        <span>Protein (${statsToday.protein}g / ${this.data.targets.protein}g)</span>
                                        <span>${Math.round(proPercent)}%</span>
                                    </div>
                                    <div class="w-full bg-black/20 rounded-full h-2">
                                        <div class="bg-blue-300 h-2 rounded-full progress-bar" style="width: ${proPercent}%"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="lg:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-4">
                            ${this.statCard('Total Intake (All Time)', statsAll.calories + ' kcal', 'text-white', 'fa-utensils')}
                            ${this.statCard('Total Protein (All Time)', statsAll.protein + ' g', 'text-accent-protein', 'fa-dumbbell')}
                            ${this.statCard('Nutritious Cals', statsAll.healthyCal + ' kcal', 'text-accent-healthy', 'fa-leaf')}
                            ${this.statCard('Junk Cals', statsAll.junkCal + ' kcal', 'text-accent-junk', 'fa-burger')}
                            ${this.statCard('Avg Calories/Meal', Math.round(statsAll.calories / Math.max(1, this.data.meals.length)) + ' kcal', 'text-gray-300', 'fa-chart-simple')}
                            ${this.statCard('Avg Protein/Meal', Math.round(statsAll.protein / Math.max(1, this.data.meals.length)) + ' g', 'text-blue-300', 'fa-egg')}
                        </div>

                        <div class="lg:col-span-1 bg-dark-card border border-dark-border rounded-xl p-5 flex flex-col items-center justify-center">
                            <h4 class="text-gray-400 text-sm font-medium mb-4 w-full text-left">Overall Diet Quality</h4>
                            <div class="relative w-48 h-48">
                                <canvas id="distChart"></canvas>
                                <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                    <div class="text-[10px] text-emerald-400 font-bold">${pHealthy}% Good</div>
                                    <div class="text-[10px] text-rose-400 font-bold">${pJunk}% Junk</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <h3 class="text-xl font-bold text-white">History</h3>
                        ${yearsHtml}
                    </div>
                `;

                setTimeout(() => {
                    const ctx = document.getElementById('distChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Healthy', 'Junk', 'Neutral'],
                            datasets: [{
                                data: [statsAll.healthyCal, statsAll.junkCal, statsAll.neutralCal],
                                backgroundColor: ['#10b981', '#ef4444', '#94a3b8'],
                                borderWidth: 0,
                                cutout: '70%'
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }, 50);
            }

            renderYearlyCard(year) {
                const yearStats = this.calculateStats('year', year);
                const avgDailyCal = Math.round(yearStats.calories / 365); // Rough avg
                
                return `
                    <div class="glass-panel rounded-xl p-6 border border-dark-border">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl font-bold text-white">${year} Overview</h3>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div class="bg-dark-bg p-4 rounded-lg border border-dark-border border-l-4 border-l-emerald-500">
                                <div class="text-gray-400 text-xs uppercase mb-1">Nutritious</div>
                                <div class="text-xl font-bold text-emerald-400">${yearStats.healthyCal.toLocaleString()} kcal</div>
                            </div>
                            <div class="bg-dark-bg p-4 rounded-lg border border-dark-border border-l-4 border-l-rose-500">
                                <div class="text-gray-400 text-xs uppercase mb-1">Junk</div>
                                <div class="text-xl font-bold text-rose-400">${yearStats.junkCal.toLocaleString()} kcal</div>
                            </div>
                            <div class="bg-dark-bg p-4 rounded-lg border border-dark-border border-l-4 border-l-blue-500">
                                <div class="text-gray-400 text-xs uppercase mb-1">Total Protein</div>
                                <div class="text-xl font-bold text-blue-400">${yearStats.protein.toLocaleString()} g</div>
                            </div>
                            <div class="bg-dark-bg p-4 rounded-lg border border-dark-border border-l-4 border-l-purple-500">
                                <div class="text-gray-400 text-xs uppercase mb-1">Total Consumed</div>
                                <div class="text-xl font-bold text-purple-400">${yearStats.calories.toLocaleString()} kcal</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            statCard(title, val, colorClass, icon) {
                return `
                    <div class="bg-dark-card border border-dark-border rounded-xl p-5 flex items-center justify-between hover:border-gray-600 transition-colors">
                        <div>
                            <p class="text-gray-400 text-xs font-semibold uppercase tracking-wide mb-1">${title}</p>
                            <p class="text-xl font-bold ${colorClass}">${val}</p>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-dark-bg flex items-center justify-center border border-dark-border">
                            <i class="fas ${icon} ${colorClass}"></i>
                        </div>
                    </div>
                `;
            }

            /* --- MEALS LIST --- */
            renderMeals(container) {
                let list = [...this.data.meals].sort((a, b) => new Date(b.date) - new Date(a.date));

                if (this.filterState.search) {
                    const q = this.filterState.search.toLowerCase();
                    list = list.filter(t => (t.name || t.description || '').toLowerCase().includes(q));
                }
                if (this.filterState.category !== 'all') {
                    list = list.filter(t => t.categories && t.categories.includes(this.filterState.category));
                }

                container.innerHTML = `
                    <div class="mb-6 flex flex-wrap gap-4 bg-dark-card p-4 rounded-xl border border-dark-border">
                        <div class="flex-1 min-w-[200px]">
                            <div class="relative">
                                <i class="fas fa-search absolute left-3 top-3 text-gray-500"></i>
                                <input type="text" placeholder="Search meals..." class="input-dark w-full pl-10 pr-4 py-2 rounded-lg"
                                oninput="app.filterState.search = this.value; app.refreshCurrentView()" value="${this.filterState.search}">
                            </div>
                        </div>
                        <select class="input-dark rounded-lg px-4 py-2" onchange="app.filterState.category = this.value; app.refreshCurrentView()">
                            <option value="all">All Categories</option>
                            ${this.data.categories.map(c => `<option value="${c.id}" ${this.filterState.category === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
                        </select>
                    </div>

                    <div class="space-y-3">
                        ${list.length === 0 ? '<div class="text-center text-gray-500 py-10">No meals logged yet</div>' : ''}
                        ${list.map(t => this.mealRow(t)).join('')}
                    </div>
                `;
            }

            mealRow(t) {
                const date = new Date(t.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
                
                // Determine health score color based on first category type (simplification)
                let borderColor = '#334155'; // default slate
                let badges = '';
                
                if (t.categories && t.categories.length > 0) {
                    badges = t.categories.map(catId => {
                        const cat = this.data.categories.find(c => c.id === catId);
                        if (!cat) return '';
                        // Set border color to first category color found
                        if (borderColor === '#334155') borderColor = cat.color;
                        return `<span class="text-[10px] px-2 py-0.5 rounded border" style="border-color:${cat.color}; color:${cat.color}">${cat.name}</span>`;
                    }).join(' ');
                }

                return `
                    <div class="bg-dark-card border rounded-lg p-4 flex flex-col md:flex-row items-start md:items-center justify-between hover:bg-dark-border/50 transition-colors group" style="border-color: ${borderColor}40; border-left: 4px solid ${borderColor}">
                        <div class="flex items-center gap-4 mb-2 md:mb-0">
                            <div>
                                <div class="font-medium text-white flex items-center gap-2">
                                    ${t.name}
                                    ${t.description ? '<i class="fas fa-info-circle text-gray-600 text-xs" title="' + t.description + '"></i>' : ''}
                                </div>
                                <div class="text-xs text-gray-500 flex flex-wrap gap-2 items-center mt-1">
                                    <span>${date}</span>
                                    ${badges}
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-6 w-full md:w-auto justify-between">
                            <div class="text-right flex gap-4">
                                <div>
                                    <div class="font-bold font-mono text-white text-lg">${t.calories} <span class="text-xs text-gray-500 font-sans">kcal</span></div>
                                </div>
                                <div>
                                    <div class="font-bold font-mono text-blue-400 text-lg">${t.protein} <span class="text-xs text-gray-500 font-sans">g pro</span></div>
                                </div>
                            </div>
                            <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onclick="app.editMeal('${t.id}')" class="w-8 h-8 rounded bg-dark-bg border border-dark-border text-brand-400 hover:text-white hover:bg-brand-600"><i class="fas fa-pencil-alt"></i></button>
                                <button onclick="app.deleteMeal('${t.id}')" class="w-8 h-8 rounded bg-dark-bg border border-dark-border text-rose-400 hover:text-white hover:bg-rose-600"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }

            /* --- CATEGORIES --- */
            renderCategories(container) {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-dark-card rounded-xl p-6 border border-dark-border">
                            <h3 class="font-bold text-white mb-4">Add Diet Type</h3>
                            <form onsubmit="app.addCategory(event)" class="flex gap-2 flex-col">
                                <input type="text" name="name" placeholder="Category Name (e.g. Sugar Free)" class="input-dark w-full rounded-lg px-4 py-2" required>
                                <div class="flex gap-2">
                                    <select name="type" class="input-dark w-full rounded-lg px-4 py-2">
                                        <option value="healthy">Healthy (Nutritious)</option>
                                        <option value="junk">Junk (Waste)</option>
                                        <option value="neutral">Neutral</option>
                                    </select>
                                    <button type="submit" class="bg-brand-600 text-white px-4 py-2 rounded-lg hover:bg-brand-500"><i class="fas fa-plus"></i></button>
                                </div>
                            </form>
                        </div>
                        <div class="col-span-1 md:col-span-2 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                            ${this.data.categories.map(c => `
                                <div class="bg-dark-bg border border-dark-border p-4 rounded-lg flex justify-between items-center" style="border-left: 4px solid ${c.color}">
                                    <div>
                                        <div class="font-bold text-white">${c.name}</div>
                                        <div class="text-xs text-gray-500 capitalize">${c.type}</div>
                                    </div>
                                    <button onclick="app.deleteCategory('${c.id}')" class="text-gray-600 hover:text-rose-500"><i class="fas fa-trash"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            /* --- LOGIC --- */
            calculateStats(mode, dateStr) {
                let meals = this.data.meals;
                if (mode === 'day') {
                    meals = meals.filter(m => m.date.startsWith(dateStr));
                } else if (mode === 'year') {
                    meals = meals.filter(m => new Date(m.date).getFullYear() === parseInt(dateStr));
                }

                const stats = {
                    calories: 0,
                    protein: 0,
                    healthyCal: 0,
                    junkCal: 0,
                    neutralCal: 0
                };

                meals.forEach(m => {
                    stats.calories += (parseFloat(m.calories) || 0);
                    stats.protein += (parseFloat(m.protein) || 0);

                    // Health Score Split
                    if (m.categories && m.categories.length > 0) {
                        const splitCal = m.calories / m.categories.length;
                        m.categories.forEach(cid => {
                            const cat = this.data.categories.find(c => c.id === cid);
                            if (cat) {
                                if (cat.type === 'healthy') stats.healthyCal += splitCal;
                                else if (cat.type === 'junk') stats.junkCal += splitCal;
                                else stats.neutralCal += splitCal;
                            } else {
                                stats.neutralCal += splitCal;
                            }
                        });
                    } else {
                        stats.neutralCal += (parseFloat(m.calories) || 0);
                    }
                });

                // Rounding
                for (let k in stats) stats[k] = Math.round(stats[k]);
                return stats;
            }

            openMealModal() {
                document.getElementById('mealModal').classList.remove('hidden');
                document.getElementById('modalTitle').textContent = "Log Meal";
                document.getElementById('editId').value = "";
                document.getElementById('mealForm').reset();
                
                // Default date to now, respecting timezone offset
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                document.getElementById('mealDate').value = now.toISOString().slice(0, 16);
                
                this.renderCategoryCheckboxes();
            }

            editMeal(id) {
                const meal = this.data.meals.find(m => m.id === id);
                if (!meal) return;

                this.openMealModal();
                document.getElementById('modalTitle').textContent = "Edit Meal";
                document.getElementById('editId').value = meal.id;
                document.getElementById('mealName').value = meal.name;
                document.getElementById('mealCalories').value = meal.calories;
                document.getElementById('mealProtein').value = meal.protein;
                document.getElementById('mealDate').value = meal.date;
                document.getElementById('mealDescription').value = meal.description || '';

                setTimeout(() => {
                    if (meal.categories) {
                        meal.categories.forEach(catId => {
                            const cb = document.querySelector(`input[name="cats"][value="${catId}"]`);
                            if (cb) cb.checked = true;
                        });
                    }
                }, 50);
            }

            closeModal() {
                document.getElementById('mealModal').classList.add('hidden');
            }

            renderCategoryCheckboxes() {
                const container = document.getElementById('categoryCheckboxes');
                container.innerHTML = this.data.categories.map(c => `
                    <label class="flex items-center space-x-2 cursor-pointer hover:bg-white/5 p-1 rounded">
                        <input type="checkbox" name="cats" value="${c.id}" class="form-checkbox text-brand-500 rounded bg-dark-bg border-gray-600">
                        <span class="text-sm text-gray-300" style="color:${c.color}">${c.name}</span>
                    </label>
                `).join('');
            }

            handleMealSubmit(e) {
                e.preventDefault();
                const editId = document.getElementById('editId').value;
                const cats = Array.from(document.querySelectorAll('input[name="cats"]:checked')).map(cb => cb.value);

                const meal = {
                    id: editId || ('meal_' + Date.now()),
                    name: document.getElementById('mealName').value,
                    calories: parseFloat(document.getElementById('mealCalories').value) || 0,
                    protein: parseFloat(document.getElementById('mealProtein').value) || 0,
                    date: document.getElementById('mealDate').value,
                    description: document.getElementById('mealDescription').value,
                    categories: cats
                };

                if (editId) {
                    const idx = this.data.meals.findIndex(m => m.id === editId);
                    if (idx !== -1) this.data.meals[idx] = meal;
                } else {
                    this.data.meals.push(meal);
                }

                this.save();
                this.closeModal();
            }

            /* --- SETTINGS & DATA --- */
            openSettings() {
                document.getElementById('targetCalories').value = this.data.targets.calories;
                document.getElementById('targetProtein').value = this.data.targets.protein;
                document.getElementById('settingsModal').classList.remove('hidden');
            }

            saveSettings() {
                const cals = parseInt(document.getElementById('targetCalories').value);
                const pro = parseInt(document.getElementById('targetProtein').value);
                if (cals && pro) {
                    this.data.targets = { calories: cals, protein: pro };
                    this.save();
                    document.getElementById('settingsModal').classList.add('hidden');
                }
            }

            importData(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        if (json.meals) {
                            this.data = json;
                            this.save();
                            alert("Import Successful!");
                        }
                    } catch (err) { alert("Invalid JSON"); }
                };
                reader.readAsText(file);
            }

            exportData() {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.data, null, 2));
                const node = document.createElement('a');
                node.setAttribute("href", dataStr);
                node.setAttribute("download", `health_backup_${new Date().toISOString().split('T')[0]}.json`);
                document.body.appendChild(node);
                node.click();
                node.remove();
            }

            deleteMeal(id) {
                if (confirm('Delete this meal log?')) {
                    this.data.meals = this.data.meals.filter(m => m.id !== id);
                    this.save();
                }
            }

            addCategory(e) {
                e.preventDefault();
                const form = e.target;
                const type = form.type.value;
                let color = '#94a3b8'; // neutral
                if (type === 'healthy') color = '#10b981';
                if (type === 'junk') color = '#ef4444';

                this.data.categories.push({
                    id: 'cat_' + Date.now(),
                    name: form.name.value,
                    type: type,
                    color: color
                });
                this.save();
                form.reset();
            }
            
            deleteCategory(id) {
                 if (confirm('Delete category? (History remains)')) {
                    this.data.categories = this.data.categories.filter(c => c.id !== id);
                    this.save();
                }
            }

            quickAddCategory() {
                const name = prompt("New Category Name:");
                if (name) {
                    const type = confirm("Is this HEALTHY? OK for Yes, Cancel for No (Junk)") ? 'healthy' : 'junk';
                    this.data.categories.push({
                        id: 'cat_' + Date.now(),
                        name: name,
                        type: type,
                        color: type === 'healthy' ? '#10b981' : '#ef4444'
                    });
                    this.save();
                    this.renderCategoryCheckboxes();
                }
            }
        }

        const app = new HealthApp();
    </script>
</body>
</html>
